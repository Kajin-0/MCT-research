name: flagship-novelty-audit

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install
        run: python -m pip install -e '.[test]'
      - name: Run novelty-boundary tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p flagship-novelty-audit
          python -m pytest -q \
            tests/test_flagship_novelty_boundary.py \
            tests/test_distributional_band_edge_manuscript_assets.py \
            2>&1 | tee flagship-novelty-audit/pytest.txt
      - name: Preserve audit records
        run: |
          cp data/validation/flagship_novelty_claim_matrix.json flagship-novelty-audit/
          cp literature/prior_art/2026-07-21-flagship-rank-theorem-audit.md flagship-novelty-audit/
          cp research/decision_records/2026-07-21-flagship-publication-framing.md flagship-novelty-audit/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flagship-novelty-audit
          path: flagship-novelty-audit
          if-no-files-found: error
          retention-days: 30
