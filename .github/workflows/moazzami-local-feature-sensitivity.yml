name: moazzami-local-feature-sensitivity

on:
  pull_request:
    paths:
      - '.github/workflows/moazzami-local-feature-sensitivity.yml'
      - 'data/manuscript/moazzami2005_figure6*_irse_digitized.csv'
      - 'data/manuscript/moazzami2005_figure6*_irse_calibration.json'
      - 'data/validation/moazzami2005_local_feature_sensitivity_reference.json'
      - 'data/validation/moazzami2005_local_feature_sensitivity_summary.csv'
      - 'src/mct_research/absorption_edge_uncertainty.py'
      - 'tools/analyze_moazzami2005_real_spectra.py'
      - 'tools/audit_moazzami2005_local_feature_sensitivity.py'
      - 'tools/audit_moazzami2005_pixel_reversal_core.py'
      - 'tools/build_moazzami_local_feature_reference.py'
      - 'tools/build_observation_model_manuscript_assets.py'
      - 'tools/observation_manuscript_figure_spectrum.py'
      - 'tests/test_moazzami2005_local_feature_sensitivity.py'
      - 'tests/test_moazzami2005_pixel_reversal_core.py'
      - 'tests/test_moazzami2005_local_feature_reference.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install
        run: python -m pip install -e '.[test]'
      - name: Build deterministic sensitivity records
        run: |
          python -m tools.audit_moazzami2005_local_feature_sensitivity \
            --repository-root . \
            --output-json /tmp/moazzami-local-feature-sensitivity.json
          python -m tools.audit_moazzami2005_pixel_reversal_core \
            --repository-root . \
            --output-json /tmp/moazzami-pixel-reversal-core.json
          python -m tools.build_moazzami_local_feature_reference \
            --repository-root . \
            --output-json /tmp/moazzami-local-feature-reference.json \
            --output-csv /tmp/moazzami-local-feature-summary.csv
      - name: Build revised manuscript assets
        run: |
          python -m tools.build_observation_model_manuscript_assets \
            --repository-root . \
            --output-dir /tmp/observation-manuscript-assets
      - name: Verify immutable compact outputs
        run: |
          cmp /tmp/moazzami-local-feature-reference.json \
            data/validation/moazzami2005_local_feature_sensitivity_reference.json
          cmp /tmp/moazzami-local-feature-summary.csv \
            data/validation/moazzami2005_local_feature_sensitivity_summary.csv
      - name: Run focused tests
        run: |
          python -m pytest -q \
            tests/test_moazzami2005_local_feature_sensitivity.py \
            tests/test_moazzami2005_pixel_reversal_core.py \
            tests/test_moazzami2005_local_feature_reference.py
      - name: Publish clean-built frozen spectrum asset
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        shell: bash
        run: |
          set -euo pipefail
          target=manuscript/observation_model_uncertainty
          cp /tmp/observation-manuscript-assets/figure1_spectrum_models.svg \
            "$target/figure1_spectrum_models.svg"
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          target = Path('manuscript/observation_model_uncertainty')
          name = 'figure1_spectrum_models.svg'
          digest = sha256((target / name).read_bytes()).hexdigest()
          manifest = target / 'SHA256SUMS'
          lines = []
          replaced = False
          for line in manifest.read_text(encoding='utf-8').splitlines():
              old_digest, old_name = line.split(maxsplit=1)
              if old_name == name:
                  lines.append(f'{digest}  {name}')
                  replaced = True
              else:
                  lines.append(f'{old_digest}  {old_name}')
          if not replaced:
              raise RuntimeError(f'{name} is missing from SHA256SUMS')
          manifest.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          print(f'{digest}  {name}')
          PY
          if git diff --quiet -- "$target/figure1_spectrum_models.svg" "$target/SHA256SUMS"; then
            echo 'Frozen spectrum asset is already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$target/figure1_spectrum_models.svg" "$target/SHA256SUMS"
          git commit -m 'Refresh audited observation-model spectrum figure'
          git push origin "HEAD:$HEAD_BRANCH"
      - name: Record compact decision summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          for filename in (
              'moazzami-local-feature-sensitivity.json',
              'moazzami-pixel-reversal-core.json',
              'moazzami-local-feature-reference.json',
          ):
              result = json.loads(Path('/tmp', filename).read_text())
              print(filename)
              print(json.dumps(result['decision'], indent=2, sort_keys=True))
              for specimen in result['specimens']:
                  print(specimen['specimen_id'])
                  if 'decision' in specimen:
                      print(json.dumps(specimen['decision'], indent=2, sort_keys=True))
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: moazzami-local-feature-sensitivity
          path: |
            /tmp/moazzami-local-feature-sensitivity.json
            /tmp/moazzami-pixel-reversal-core.json
            /tmp/moazzami-local-feature-reference.json
            /tmp/moazzami-local-feature-summary.csv
            /tmp/observation-manuscript-assets
          if-no-files-found: error
          retention-days: 30
