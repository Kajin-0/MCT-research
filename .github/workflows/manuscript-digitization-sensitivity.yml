name: manuscript-digitization-sensitivity

on:
  pull_request:
    paths:
      - '.github/workflows/manuscript-digitization-sensitivity.yml'
      - 'data/manuscript/moazzami2005_figure6a_irse_digitized.csv'
      - 'data/manuscript/moazzami2005_figure6b_irse_digitized.csv'
      - 'data/manuscript/moazzami2005_figure6a_irse_calibration.json'
      - 'data/manuscript/moazzami2005_figure6b_irse_calibration.json'
      - 'tools/audit_moazzami2005_digitization_sensitivity.py'
      - 'tests/test_moazzami2005_digitization_sensitivity.py'
      - 'tests/test_moazzami2005_digitization_reference.py'
      - 'validation/moazzami2005_digitization_sensitivity_reference_result.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install package
        run: python -m pip install -e '.[test]'
      - name: Run sensitivity audit
        run: |
          mkdir -p manuscript-digitization-sensitivity-evidence
          python -m tools.audit_moazzami2005_digitization_sensitivity \
            --repository-root . \
            --output-json manuscript-digitization-sensitivity-evidence/result.json
      - name: Run focused tests
        run: |
          python -m pytest -q \
            tests/test_moazzami2005_digitization_sensitivity.py \
            tests/test_moazzami2005_digitization_reference.py
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manuscript-digitization-sensitivity-evidence
          path: manuscript-digitization-sensitivity-evidence
          if-no-files-found: error
          retention-days: 30
