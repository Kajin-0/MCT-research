name: observation-manuscript-assets

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install
        run: python -m pip install -e '.[test]'
      - name: Build
        run: |
          python -m tools.analyze_moazzami2005_manuscript_comparators --repository-root . --output-json material-comparator-analysis.json
          python -m tools.build_observation_model_manuscript_assets --repository-root . --output-dir generated
          python -m tools.build_observation_model_conceptual_figures --output-dir conceptual-generated
          python -m tools.build_observation_model_irpt_submission_tables --repository-root . --output-dir irpt-tables-generated
      - name: Focused tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q \
            tests/test_historical_seiler1990.py \
            tests/test_moazzami2005_seiler_comparator.py \
            tests/test_moazzami2005_comparator_rows.py \
            tests/test_observation_manuscript_assets.py \
            tests/test_observation_manuscript_conceptual_figures.py \
            tests/test_observation_manuscript_draft.py \
            tests/test_observation_manuscript_references.py \
            tests/test_irpt_submission_front_matter.py \
            tests/test_observation_model_irpt_tables.py \
            tests/test_irpt_latex_package.py \
            tests/test_irpt_technical_review.py \
            2>&1 | tee generated/pytest.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: observation-manuscript-assets
          path: |
            generated
            conceptual-generated
            irpt-tables-generated
            material-comparator-analysis.json
          if-no-files-found: error
          retention-days: 30