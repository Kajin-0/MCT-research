name: scott-figure2-digitization

on:
  pull_request:
    paths:
      - '.github/workflows/scott-figure2-extraction-gate.yml'
      - 'data/experimental/scott1969_README.md'
      - 'data/experimental/scott1969_source_metadata.csv'
      - 'data/experimental/scott1969_figure1_specimens.csv'
      - 'data/experimental/scott1969_figure2_extraction_README.md'
      - 'data/experimental/scott1969_figure2_extraction_gate.csv'
      - 'data/experimental/scott1969_figure2_digitized.csv'
      - 'data/experimental/scott1969_figure2_calibration.csv'
      - 'tests/test_scott1969_source_audit.py'
      - 'tests/test_scott1969_figure2_extraction_gate.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install package
        run: python -m pip install -e '.[test]'
      - name: Validate Scott source and Figure 2 digitization
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q \
            tests/test_scott1969_source_audit.py \
            tests/test_scott1969_figure2_extraction_gate.py \
            2>&1 | tee /tmp/scott-figure2-digitization.log
      - name: Assert scientific boundary
        shell: bash
        run: |
          python - <<'PY'
          import csv
          from collections import Counter
          from pathlib import Path

          root = Path('.')
          data = root / 'data/experimental'
          gate = {
              row['record_id']: row
              for row in csv.DictReader(
                  (data / 'scott1969_figure2_extraction_gate.csv').open(
                      newline='', encoding='utf-8'
                  )
              )
          }
          markers = list(csv.DictReader(
              (data / 'scott1969_figure2_digitized.csv').open(
                  newline='', encoding='utf-8'
              )
          ))
          calibration = list(csv.DictReader(
              (data / 'scott1969_figure2_calibration.csv').open(
                  newline='', encoding='utf-8'
              )
          ))

          assert gate['SCOTT69_F2']['role'] == 'direct_marker_source'
          assert gate['SCOTT69_F2']['numerical_rows_authorized'] == 'true'
          assert gate['SCOTT69_F5']['role'] == 'provenance_cross_check_only'
          assert gate['SCOTT69_F5']['status'] == 'rejected_as_independent_dataset'
          assert len(markers) == 70
          assert len(calibration) == 17
          assert Counter(row['specimen_label'] for row in markers) == {
              '61': 8,
              '53': 6,
              '46': 9,
              '40.5': 8,
              '38.5': 8,
              '35': 8,
              '31': 8,
              '25': 7,
              '23': 8,
          }
          assert all(
              row['marker_assignment_basis']
              == 'direct_marker_center_only_not_connecting_line_or_equation'
              for row in markers
          )
          assert not (data / 'scott1969_figure5_digitized.csv').exists()
          PY
      - name: Assert tranche boundary
        if: github.head_ref == 'agent/scott1969-figure2-digitization'
        shell: bash
        run: |
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" | sort > /tmp/changed.txt
          cat > /tmp/allowed.txt <<'EOF'
          .github/workflows/scott-figure2-extraction-gate.yml
          data/experimental/scott1969_README.md
          data/experimental/scott1969_source_metadata.csv
          data/experimental/scott1969_figure1_specimens.csv
          data/experimental/scott1969_figure2_calibration.csv
          data/experimental/scott1969_figure2_digitized.csv
          data/experimental/scott1969_figure2_extraction_README.md
          data/experimental/scott1969_figure2_extraction_gate.csv
          tests/test_scott1969_source_audit.py
          tests/test_scott1969_figure2_extraction_gate.py
          EOF
          sort -o /tmp/allowed.txt /tmp/allowed.txt
          unexpected=$(comm -23 /tmp/changed.txt /tmp/allowed.txt)
          if [ -n "$unexpected" ]; then
            printf 'Unexpected changed files:\n%s\n' "$unexpected"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scott-figure2-digitization
          path: |
            /tmp/scott-figure2-digitization.log
            data/experimental/scott1969_README.md
            data/experimental/scott1969_source_metadata.csv
            data/experimental/scott1969_figure1_specimens.csv
            data/experimental/scott1969_figure2_extraction_README.md
            data/experimental/scott1969_figure2_extraction_gate.csv
            data/experimental/scott1969_figure2_calibration.csv
            data/experimental/scott1969_figure2_digitized.csv
          if-no-files-found: error
          retention-days: 30
