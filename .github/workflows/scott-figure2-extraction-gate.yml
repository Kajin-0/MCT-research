name: scott-figure2-extraction-gate

on:
  pull_request:
    paths:
      - '.github/workflows/scott-figure2-extraction-gate.yml'
      - 'data/experimental/scott1969_figure2_extraction_README.md'
      - 'data/experimental/scott1969_figure2_extraction_gate.csv'
      - 'data/experimental/scott1969_figure2_digitized.csv'
      - 'data/experimental/scott1969_figure2_calibration.csv'
      - 'tests/test_scott1969_figure2_extraction_gate.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install package
        run: python -m pip install -e '.[test]'
      - name: Validate Scott Figure 2 extraction gate
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q tests/test_scott1969_figure2_extraction_gate.py \
            2>&1 | tee /tmp/scott-figure2-extraction-gate.log
      - name: Assert fail-closed source boundary
        shell: bash
        run: |
          python - <<'PY'
          import csv
          from pathlib import Path

          root = Path('.')
          gate = list(csv.DictReader(
              (root / 'data/experimental/scott1969_figure2_extraction_gate.csv').open(
                  newline='', encoding='utf-8'
              )
          ))
          assert len(gate) == 2
          rows = {row['record_id']: row for row in gate}
          assert rows['SCOTT69_F2']['role'] == 'direct_marker_source'
          assert rows['SCOTT69_F2']['numerical_rows_authorized'] == 'false'
          assert rows['SCOTT69_F5']['role'] == 'provenance_cross_check_only'
          assert rows['SCOTT69_F5']['status'] == 'rejected_as_independent_dataset'
          assert not (root / 'data/experimental/scott1969_figure2_digitized.csv').exists()
          assert not (root / 'data/experimental/scott1969_figure2_calibration.csv').exists()
          PY
      - name: Assert tranche boundary
        if: github.head_ref == 'agent/scott1969-figure2-digitization'
        shell: bash
        run: |
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" | sort > /tmp/changed.txt
          cat > /tmp/allowed.txt <<'EOF'
          .github/workflows/scott-figure2-extraction-gate.yml
          data/experimental/scott1969_figure2_extraction_README.md
          data/experimental/scott1969_figure2_extraction_gate.csv
          tests/test_scott1969_figure2_extraction_gate.py
          EOF
          sort -o /tmp/allowed.txt /tmp/allowed.txt
          unexpected=$(comm -23 /tmp/changed.txt /tmp/allowed.txt)
          if [ -n "$unexpected" ]; then
            printf 'Unexpected changed files:\n%s\n' "$unexpected"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scott-figure2-extraction-gate
          path: |
            /tmp/scott-figure2-extraction-gate.log
            data/experimental/scott1969_figure2_extraction_README.md
            data/experimental/scott1969_figure2_extraction_gate.csv
          if-no-files-found: error
          retention-days: 30

  materialize-source-pages:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install browser and deterministic renderer
        run: |
          python -m pip install 'playwright==1.55.0' 'pypdfium2==4.30.0' 'Pillow==11.3.0'
          python -m playwright install --with-deps chromium
      - name: Establish browser session and render source pages
        shell: bash
        run: |
          set -o pipefail
          mkdir -p /tmp/scott-source-materialization
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import importlib.metadata
          import json
          import time
          from pathlib import Path

          import pypdfium2 as pdfium
          from playwright.sync_api import TimeoutError as PlaywrightTimeoutError
          from playwright.sync_api import sync_playwright

          OUT = Path('/tmp/scott-source-materialization')
          PDF_URL = 'https://pubs.aip.org/aip/jap/article-pdf/40/10/4077/10556980/4077_1_online.pdf'
          ARTICLE_URLS = [
              'https://pubs.aip.org/jap/article/40/10/4077/4303/Energy-Gap-in-Hg1-xCdxTe-by-Optical-Absorption',
              'https://pubs.aip.org/aip/jap/article/40/10/4077/4303/Energy-Gap-in-Hg1-xCdxTe-by-Optical-Absorption',
              'https://doi.org/10.1063/1.1657147',
          ]
          USER_AGENT = (
              'Mozilla/5.0 (Windows NT 10.0; Win64; x64) '
              'AppleWebKit/537.36 (KHTML, like Gecko) '
              'Chrome/140.0.0.0 Safari/537.36'
          )

          diagnostics: dict[str, object] = {
              'doi': '10.1063/1.1657147',
              'retrieval_timestamp_utc': time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
              'pdf_url': PDF_URL,
              'article_attempts': [],
              'pdf_attempts': [],
              'selected_source_url': None,
              'source_pdf_sha256': None,
              'source_pdf_size_bytes': None,
              'renderer': {
                  'name': 'pypdfium2',
                  'version': importlib.metadata.version('pypdfium2'),
                  'dpi': 600,
              },
              'rendered_pages': [],
          }
          pdf_bytes: bytes | None = None

          def valid_pdf(payload: bytes) -> bool:
              if not payload.startswith(b'%PDF-') or len(payload) < 10000:
                  return False
              try:
                  return len(pdfium.PdfDocument(payload)) >= 6
              except Exception:
                  return False

          with sync_playwright() as pw:
              browser = pw.chromium.launch(
                  headless=True,
                  args=[
                      '--disable-blink-features=AutomationControlled',
                      '--disable-dev-shm-usage',
                      '--no-sandbox',
                  ],
              )
              context = browser.new_context(
                  user_agent=USER_AGENT,
                  locale='en-US',
                  viewport={'width': 1440, 'height': 1100},
                  extra_http_headers={
                      'Accept-Language': 'en-US,en;q=0.9',
                      'Upgrade-Insecure-Requests': '1',
                  },
              )
              context.add_init_script(
                  "Object.defineProperty(navigator, 'webdriver', {get: () => undefined});"
              )
              page = context.new_page()

              for index, url in enumerate(ARTICLE_URLS, start=1):
                  record: dict[str, object] = {'url': url}
                  try:
                      response = page.goto(url, wait_until='domcontentloaded', timeout=90000)
                      page.wait_for_timeout(15000)
                      record.update({
                          'status': response.status if response else None,
                          'resolved_url': page.url,
                          'title': page.title(),
                          'content_length': len(page.content()),
                          'cookie_names': sorted(cookie['name'] for cookie in context.cookies()),
                      })
                      page.screenshot(
                          path=str(OUT / f'article_attempt_{index}.png'),
                          full_page=False,
                      )
                      (OUT / f'article_attempt_{index}.html').write_text(
                          page.content(), encoding='utf-8'
                      )
                  except Exception as exc:
                      record['error'] = f'{type(exc).__name__}: {exc}'
                  diagnostics['article_attempts'].append(record)

              request_headers = {
                  'Accept': 'application/pdf,application/octet-stream;q=0.9,*/*;q=0.8',
                  'Referer': str(diagnostics['article_attempts'][-1].get('resolved_url') or ARTICLE_URLS[0]),
                  'User-Agent': USER_AGENT,
              }
              try:
                  response = context.request.get(
                      PDF_URL,
                      headers=request_headers,
                      timeout=90000,
                      fail_on_status_code=False,
                  )
                  payload = response.body()
                  record = {
                      'method': 'browser_context_request',
                      'status': response.status,
                      'url': response.url,
                      'content_type': response.headers.get('content-type'),
                      'size_bytes': len(payload),
                      'sha256': hashlib.sha256(payload).hexdigest(),
                      'magic': payload[:8].hex(),
                  }
                  if valid_pdf(payload):
                      pdf_bytes = payload
                      record['result'] = 'selected_valid_pdf'
                  else:
                      record['result'] = 'rejected_non_pdf'
                      (OUT / 'browser_request_response.bin').write_bytes(payload)
                  diagnostics['pdf_attempts'].append(record)
              except Exception as exc:
                  diagnostics['pdf_attempts'].append({
                      'method': 'browser_context_request',
                      'error': f'{type(exc).__name__}: {exc}',
                  })

              if pdf_bytes is None:
                  try:
                      response = page.goto(PDF_URL, wait_until='commit', timeout=90000)
                      page.wait_for_timeout(20000)
                      payload = response.body() if response else b''
                      record = {
                          'method': 'page_navigation',
                          'status': response.status if response else None,
                          'resolved_url': page.url,
                          'content_type': response.headers.get('content-type') if response else None,
                          'size_bytes': len(payload),
                          'sha256': hashlib.sha256(payload).hexdigest(),
                          'magic': payload[:8].hex(),
                          'title': page.title(),
                      }
                      if valid_pdf(payload):
                          pdf_bytes = payload
                          record['result'] = 'selected_valid_pdf'
                      else:
                          record['result'] = 'rejected_non_pdf'
                          page.screenshot(path=str(OUT / 'pdf_navigation.png'), full_page=False)
                          (OUT / 'pdf_navigation.html').write_text(page.content(), encoding='utf-8')
                          (OUT / 'pdf_navigation_response.bin').write_bytes(payload)
                      diagnostics['pdf_attempts'].append(record)
                  except Exception as exc:
                      diagnostics['pdf_attempts'].append({
                          'method': 'page_navigation',
                          'error': f'{type(exc).__name__}: {exc}',
                      })
              browser.close()

          if pdf_bytes is not None:
              diagnostics['selected_source_url'] = PDF_URL
              diagnostics['source_pdf_sha256'] = hashlib.sha256(pdf_bytes).hexdigest()
              diagnostics['source_pdf_size_bytes'] = len(pdf_bytes)
              document = pdfium.PdfDocument(pdf_bytes)
              for page_number in (4, 6):
                  page = document[page_number - 1]
                  bitmap = page.render(scale=600 / 72, rotation=0)
                  image = bitmap.to_pil()
                  page_path = OUT / f'scott1969_pdf_page_{page_number}_600dpi.png'
                  image.save(page_path, format='PNG', optimize=False)
                  diagnostics['rendered_pages'].append({
                      'pdf_page_number': page_number,
                      'article_page': 4079 if page_number == 4 else 4081,
                      'width_px': image.width,
                      'height_px': image.height,
                      'sha256': hashlib.sha256(page_path.read_bytes()).hexdigest(),
                      'file': page_path.name,
                  })
              diagnostics['materialization_status'] = 'success'
          else:
              diagnostics['materialization_status'] = 'browser_session_did_not_retrieve_pdf'

          (OUT / 'materialization.json').write_text(
              json.dumps(diagnostics, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(diagnostics, indent=2, sort_keys=True))
          PY
      - name: Upload source-resolution evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scott1969-source-materialization
          path: /tmp/scott-source-materialization
          if-no-files-found: error
          retention-days: 2
