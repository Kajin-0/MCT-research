name: r02-epw-direct-fixture-design

on:
  pull_request:
    paths:
      - '.github/workflows/r02-epw-direct-fixture-design.yml'
      - 'first_principles/b0/r02_epw_direct_fixture_design_contract.json'
      - 'research/capability_audits/qe76_epw61_direct_fixture_design.md'
      - 'tools/design_epw_direct_fixture.py'
      - 'tests/test_r02_epw_direct_fixture_design.py'
  workflow_dispatch:

concurrency:
  group: r02-epw-direct-fixture-design-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  design-only:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install test dependency
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Validate design contract and inert manifest
        run: python -m pytest -vv tests/test_r02_epw_direct_fixture_design.py

      - name: Verify execution remains closed
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          contract = json.loads(
              Path(
                  "first_principles/b0/r02_epw_direct_fixture_design_contract.json"
              ).read_text()
          )
          assert contract["phase"] == "design_only"
          authorization = contract["authorization"]
          assert authorization["configure_or_build"] is False
          assert authorization["pw_x_execution"] is False
          assert authorization["ph_x_execution"] is False
          assert authorization["epw_x_execution"] is False
          assert authorization["pp_py_execution"] is False
          assert authorization["fixture_execution"] is False
          assert authorization["automatic_phase_transition"] is False
          PY
