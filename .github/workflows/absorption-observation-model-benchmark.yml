name: absorption-observation-model-benchmark

on:
  pull_request:
    paths:
      - '.github/workflows/absorption-observation-model-benchmark.yml'
      - 'tools/benchmark_absorption_observation_models.py'
      - 'tests/test_absorption_observation_models.py'
      - 'src/mct_research/gap_models.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install package
        run: python -m pip install -e ".[test]"

      - name: Execute observation-model benchmark
        run: |
          mkdir -p absorption-observation-model-evidence
          python -m tools.benchmark_absorption_observation_models \
            --output-json absorption-observation-model-evidence/result.json \
            > absorption-observation-model-evidence/stdout.txt \
            2> absorption-observation-model-evidence/stderr.txt
          python -m pytest -q tests/test_absorption_observation_models.py \
            > absorption-observation-model-evidence/pytest.txt \
            2> absorption-observation-model-evidence/pytest-stderr.txt

      - name: Record environment and hashes
        if: always()
        run: |
          python --version > absorption-observation-model-evidence/python-version.txt
          find absorption-observation-model-evidence -type f ! -name sha256.txt -print0 \
            | sort -z | xargs -0 sha256sum \
            > absorption-observation-model-evidence/sha256.txt

      - name: Upload benchmark evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: absorption-observation-model-evidence
          path: absorption-observation-model-evidence
          if-no-files-found: error
          retention-days: 30
