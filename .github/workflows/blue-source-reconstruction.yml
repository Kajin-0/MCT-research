name: blue-source-reconstruction

on:
  pull_request:
    paths:
      - '.github/workflows/blue-source-reconstruction.yml'
      - 'data/experimental/blue1964_README.md'
      - 'data/experimental/blue1964_source_metadata.csv'
      - 'data/experimental/blue1964_table2_optical_gaps.csv'
      - 'research/programs/empirical_bandgap/state.md'
      - 'tests/test_blue1964_table_reconstruction.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install package
        run: python -m pip install -e '.[test]'
      - name: Validate Blue source reconstruction
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q tests/test_blue1964_table_reconstruction.py \
            2>&1 | tee /tmp/blue-source-reconstruction-pytest.log
      - name: Assert source, sign, and pseudo-data boundary
        shell: bash
        run: |
          python - <<'PY'
          import csv
          from pathlib import Path

          root = Path('.')
          metadata = list(csv.DictReader(
              (root / 'data/experimental/blue1964_source_metadata.csv').open(
                  newline='', encoding='utf-8'
              )
          ))
          rows = list(csv.DictReader(
              (root / 'data/experimental/blue1964_table2_optical_gaps.csv').open(
                  newline='', encoding='utf-8'
              )
          ))
          assert len(metadata) == 1
          assert len(rows) == 7
          assert metadata[0]['source_pdf_sha256'] == ''
          assert metadata[0]['pointwise_energy_covariance'] == 'not_reported'
          assert all(row['signed_gap_eligible'] == 'false' for row in rows)
          assert all(row['temperature_k'] == '' for row in rows)
          assert all(row['pointwise_energy_covariance'] == 'not_reported' for row in rows)
          assert not (root / 'data/experimental/blue1964_figure6_digitized.csv').exists()
          PY
      - name: Assert tranche file boundary
        if: github.head_ref == 'agent/blue1964-table-reconstruction'
        shell: bash
        run: |
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" \
            | sort > /tmp/changed-files.txt
          cat > /tmp/allowed-files.txt <<'EOF'
          .github/workflows/blue-source-reconstruction.yml
          data/experimental/blue1964_README.md
          data/experimental/blue1964_source_metadata.csv
          data/experimental/blue1964_table2_optical_gaps.csv
          research/programs/empirical_bandgap/state.md
          tests/test_blue1964_table_reconstruction.py
          EOF
          sort -o /tmp/allowed-files.txt /tmp/allowed-files.txt
          unexpected=$(comm -23 /tmp/changed-files.txt /tmp/allowed-files.txt)
          if [ -n "$unexpected" ]; then
            printf 'Unexpected changed files:\n%s\n' "$unexpected"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blue-source-reconstruction
          path: |
            /tmp/blue-source-reconstruction-pytest.log
            data/experimental/blue1964_source_metadata.csv
            data/experimental/blue1964_table2_optical_gaps.csv
            data/experimental/blue1964_README.md
            research/programs/empirical_bandgap/state.md
          if-no-files-found: error
          retention-days: 30
