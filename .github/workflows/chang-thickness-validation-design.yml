name: chang-thickness-validation-design

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  design:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install
        run: python -m pip install -e '.[test]'
      - name: Focused tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q \
            tests/test_chang_validation_design.py \
            tests/test_chang_validation_design_record.py \
            2>&1 | tee chang-thickness-validation-design-pytest.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chang-thickness-validation-design
          path: |
            chang-thickness-validation-design-pytest.txt
            data/validation/chang_thickness_pair_validation_design.json
            data/templates/chang_thickness_validation_dataset.schema.json
            docs/derivations/014_chang_thickness_pair_validation_design.md
          if-no-files-found: error
          retention-days: 30
