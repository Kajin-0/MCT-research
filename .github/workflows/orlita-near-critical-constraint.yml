name: orlita-near-critical-constraint

on:
  pull_request:
    paths:
      - '.github/workflows/orlita-near-critical-constraint.yml'
      - 'data/experimental/orlita2014_primary_near_critical_constraint.csv'
      - 'data/evidence/hgcdte_primary_gap_source_recovery.csv'
      - 'tools/analyze_orlita2014_near_critical_constraint.py'
      - 'tools/audit_primary_gap_source_recovery.py'
      - 'tests/test_orlita2014_near_critical_constraint.py'
      - 'tests/test_primary_gap_source_recovery.py'
      - 'validation/orlita2014_near_critical_constraint_reference_result.json'
      - 'validation/primary_gap_source_recovery_reference_result.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install package
        run: python -m pip install -e ".[test]"

      - name: Execute Orlita and central source audits
        run: |
          mkdir -p orlita-near-critical-evidence
          python -m tools.analyze_orlita2014_near_critical_constraint \
            --input-csv data/experimental/orlita2014_primary_near_critical_constraint.csv \
            --output-json orlita-near-critical-evidence/orlita-result.json \
            > orlita-near-critical-evidence/orlita-stdout.txt \
            2> orlita-near-critical-evidence/orlita-stderr.txt
          python -m tools.audit_primary_gap_source_recovery \
            --input-csv data/evidence/hgcdte_primary_gap_source_recovery.csv \
            --output-json orlita-near-critical-evidence/source-recovery-result.json \
            > orlita-near-critical-evidence/source-recovery-stdout.txt \
            2> orlita-near-critical-evidence/source-recovery-stderr.txt
          python -m pytest -q \
            tests/test_orlita2014_near_critical_constraint.py \
            tests/test_primary_gap_source_recovery.py \
            > orlita-near-critical-evidence/pytest.txt \
            2> orlita-near-critical-evidence/pytest-stderr.txt

      - name: Verify central classification
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          result = json.loads(
              Path('orlita-near-critical-evidence/source-recovery-result.json').read_text(
                  encoding='utf-8'
              )
          )
          assert result['source_count'] == 9
          assert result['primary_source_count'] == 8
          assert result['authorized_primary_fit_source_count'] == 0
          assert result['conditional_primary_source_count'] == 2
          assert result['blocked_primary_source_count'] == 6
          assert result['screen_only_source_count'] == 1
          statuses = {item['source_id']: item['status'] for item in result['sources']}
          assert statuses['orlita2014_graded_mbe'] == 'conditional'
          assert result['decision']['new_static_refit_authorized'] is False
          PY

      - name: Record environment and hashes
        if: always()
        run: |
          python --version > orlita-near-critical-evidence/python-version.txt
          find orlita-near-critical-evidence -type f ! -name sha256.txt -print0 \
            | sort -z | xargs -0 sha256sum \
            > orlita-near-critical-evidence/sha256.txt

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orlita-near-critical-evidence
          path: orlita-near-critical-evidence
          if-no-files-found: error
          retention-days: 30
