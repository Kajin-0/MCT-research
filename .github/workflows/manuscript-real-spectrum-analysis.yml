name: manuscript-real-spectrum-analysis

on:
  pull_request:
    paths:
      - '.github/workflows/manuscript-real-spectrum-analysis.yml'
      - 'data/manuscript/**'
      - 'tools/analyze_moazzami2005_real_spectra.py'
      - 'tests/test_moazzami2005_real_spectra.py'
      - 'validation/moazzami2005_real_spectrum_reference_result.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install package
        run: python -m pip install -e '.[test]'
      - name: Recompute analysis
        run: |
          mkdir -p manuscript-real-spectrum-evidence
          python -m tools.analyze_moazzami2005_real_spectra \
            --repository-root . \
            --output-json manuscript-real-spectrum-evidence/result.json \
            --compact-output-json manuscript-real-spectrum-evidence/compact.json
      - name: Verify reference
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          actual = json.loads(Path('manuscript-real-spectrum-evidence/compact.json').read_text())
          expected = json.loads(Path('validation/moazzami2005_real_spectrum_reference_result.json').read_text())
          assert actual == expected
          PY
      - name: Run focused tests
        run: python -m pytest -q tests/test_moazzami2005_real_spectra.py
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manuscript-real-spectrum-evidence
          path: manuscript-real-spectrum-evidence
          if-no-files-found: error
          retention-days: 30
