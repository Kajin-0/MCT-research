name: bootstrap-herrmann-readiness-ledger

on:
  pull_request:
    paths:
      - '.github/workflows/bootstrap-herrmann-readiness-ledger.yml'
      - 'research/decision_records/2026-07-20-herrmann-model-readiness.md'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-24.04
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Update controlling program ledger
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('research/active_progress.md')
          text = path.read_text(encoding='utf-8')
          absorption_anchor = (
              '- The Chang candidate is an observation-model sensitivity operator, not a '
              'material-gap law. Free joint fitting of `W`, `b`, and `Eg` is not authorized '
              'in the current tranche.\n'
          )
          absorption_replacement = absorption_anchor + (
              '- The recovered Herrmann 1992/1993 chain does not define a complete '
              'executable model: the high-energy Anderson branch, explicit band-filling '
              'factors, carrier-density/quasi-Fermi mapping, and Kane parameter conventions '
              'remain external. Hybrid implementation is blocked.\n'
              '- Herrmann 1993 Table I is preserved only as an eight-row secondary '
              'model-validation comparison. Its transition-offset MAE is `2.35 meV` with '
              'a maximum absolute error of `8.4 meV`; its transition-absorption comparison '
              'spans a maximum factor error of `2.865`. The table is not independent gap '
              'fit evidence.\n'
          )
          if text.count(absorption_anchor) != 1:
              raise SystemExit('Herrmann absorption ledger anchor changed')
          text = text.replace(absorption_anchor, absorption_replacement, 1)

          next_anchor = (
              '4. Recover and audit Herrmann 1992, DOI '
              '`10.1016/0022-0248(92)90851-9`, only if the complete operator can be '
              'reconstructed without hybrid assumptions.\n'
          )
          next_replacement = (
              '4. The Herrmann implementation path is blocked until Anderson 1977/1980, '
              'the full 1992 precursor, explicit `BFF_lh`/`BFF_hh`, carrier-density to '
              'quasi-Fermi mapping, and composition-dependent Kane conventions are '
              'recovered and jointly audited.\n'
          )
          if text.count(next_anchor) != 1:
              raise SystemExit('Herrmann authorized-next-work anchor changed')
          text = text.replace(next_anchor, next_replacement, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Run focused readiness tests
        run: |
          python -m pip install -e . pytest
          pytest -q tests/test_herrmann_model_readiness.py
          python tools/audit_herrmann_model_readiness.py \
            --input-json data/evidence/hgcdte_herrmann_readiness.json \
            --output-json /tmp/herrmann-readiness-audit.json

      - name: Freeze readiness record
        run: |
          rm -f .github/workflows/bootstrap-herrmann-readiness-ledger.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Record Herrmann model-readiness gate'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
