name: scott-temperature-coefficient-test

on:
  push:
    branches:
      - agent/scott1969-temperature-coefficients
    paths:
      - '.github/workflows/scott-temperature-coefficient-test.yml'
      - 'research/programs/empirical_bandgap/state.md'
  pull_request:
    paths:
      - '.github/workflows/scott-temperature-coefficient-test.yml'
      - 'data/experimental/scott1969_figure2_digitized.csv'
      - 'data/validation/scott1969_temperature_coefficient_test.json'
      - 'docs/derivations/021_scott_fixed_alpha_temperature_coefficients.md'
      - 'research/decision_records/2026-07-23-scott-temperature-coefficient-test.md'
      - 'research/programs/empirical_bandgap/state.md'
      - 'src/mct_research/scott_temperature_coefficients.py'
      - 'tests/test_scott_temperature_coefficients.py'
      - 'tests/test_scott_temperature_coefficient_reference.py'
      - 'tools/build_scott_temperature_coefficient_reference.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install package
        run: python -m pip install -e '.[test]'
      - name: Run focused analysis tests
        run: |
          python -m pytest -vv tests/test_scott_temperature_coefficients.py \
            2>&1 | tee /tmp/scott-temperature-coefficient-tests.log
      - name: Build deterministic candidate reference twice
        run: |
          python tools/build_scott_temperature_coefficient_reference.py \
            --output /tmp/scott-temperature-coefficient-a.json
          python tools/build_scott_temperature_coefficient_reference.py \
            --output /tmp/scott-temperature-coefficient-b.json
          cmp /tmp/scott-temperature-coefficient-a.json \
              /tmp/scott-temperature-coefficient-b.json
      - name: Assert candidate decision and claim boundary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          result = json.loads(
              Path('/tmp/scott-temperature-coefficient-a.json').read_text()
          )
          assert result['program'] == 'R01'
          assert result['issue'] == 312
          assert result['source']['row_count'] == 70
          assert result['source']['specimen_count'] == 9
          assert result['decision']['decision'] == (
              'non_identifiable_at_figure_precision'
          )
          boundary = result['observation_boundary']
          assert boundary['signed_gap_eligible'] is False
          assert (
              boundary['intrinsic_gap_eligible_without_observation_operator']
              is False
          )
          assert boundary['coordinate_half_widths_are_gaussian_sigma'] is False
          assert result['decision']['gates'][
              'S1_core_box_feasible'
          ] is False
          assert result['decision']['gates'][
              'SH_core_box_feasible'
          ] is False
          PY
      - name: Validate committed reference
        run: |
          cmp /tmp/scott-temperature-coefficient-a.json \
              data/validation/scott1969_temperature_coefficient_test.json
          python -m pytest -vv \
            tests/test_scott_temperature_coefficient_reference.py
      - name: Reconcile Scott result into R01 state once
        env:
          TARGET_REF: ${{ github.head_ref || github.ref_name }}
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('research/programs/empirical_bandgap/state.md')
          text = path.read_text(encoding='utf-8')

          controlling_old = (
              '- #265 — Scott 1969 fixed-absorption optical-edge source audit;\n'
          )
          controlling_new = (
              controlling_old
              + '- #303 — Scott 1969 Figure 2 fixed-alpha marker reconstruction;\n'
              + '- #312 — Scott 1969 fixed-alpha temperature-coefficient test;\n'
          )
          if '#312 — Scott 1969 fixed-alpha temperature-coefficient test;' not in text:
              assert text.count(controlling_old) == 1
              text = text.replace(controlling_old, controlling_new, 1)

          foundation_old = (
              '- source-level Scott 1969 metrology and Figure 1 specimen audit '
              'with a fail-closed digitization gate;'
          )
          foundation_new = (
              '- specimen-preserving Scott 1969 Figure 2 reconstruction with '
              '70 fixed-alpha markers across nine measured-composition series, '
              'plus a fail-closed temperature-coefficient test resolving to '
              '`non_identifiable_at_figure_precision`;'
          )
          if foundation_old in text:
              assert text.count(foundation_old) == 1
              text = text.replace(foundation_old, foundation_new, 1)

          start_header = '## Scott 1969 fixed-absorption optical-edge source audit\n'
          replacement_header = (
              '## Scott 1969 fixed-alpha optical-edge reconstruction and '
              'temperature test\n'
          )
          end_header = '## Blue 1964 theory-conditioned optical-gap reconstruction\n'
          if start_header in text:
              assert text.count(start_header) == 1
              assert text.count(end_header) == 1
              start = text.index(start_header)
              end = text.index(end_header, start)
              scott_section = '''## Scott 1969 fixed-alpha optical-edge reconstruction and temperature test

Issues #265, #303, and #312, merged PR #304, and the current temperature-coefficient tranche establish the source contract, direct-marker ledger, and bounded thermal-trend result for Scott 1969.

Canonical source and result files are:

```text
data/experimental/scott1969_source_metadata.csv
data/experimental/scott1969_figure1_specimens.csv
data/experimental/scott1969_figure2_calibration.csv
data/experimental/scott1969_figure2_digitized.csv
data/experimental/scott1969_figure2_extraction_gate.csv
data/experimental/scott1969_README.md
data/validation/scott1969_temperature_coefficient_test.json
docs/derivations/021_scott_fixed_alpha_temperature_coefficients.md
research/decision_records/2026-07-23-scott-temperature-coefficient-test.md
```

The primary PDF is provenance-bound by SHA256

```text
7b2e5790745897ecd75bd22134e5d9293397820c3b7851eb5a9e648a5c441324
```

and the committed 70-row marker ledger is bound by SHA256

```text
6fd672cb9469d16d0dce2dc4657af99391e1652b79a2e59cd4661d03bdebc851.
```

### Measurement and specimen boundary

Scott used modified-Bridgman specimens. Density composition has source precision `+/-0.005` in fractional `x`; microprobe checks found illuminated-area variation up to approximately `0.02` in `x`, typically lower. These are source-level bounds, not independent pointwise Gaussian errors.

Every admitted Figure 2 marker is the photon energy at

```text
alpha = 500 cm^-1.
```

The measurement class remains

```text
fixed_absorption_optical_edge_alpha_500_cm_inverse
signed_gap_eligible = false
intrinsic_gap_eligible_without_observation_operator = false
pointwise_experimental_covariance = not_reported.
```

It remains distinct from exciton-conditioned gaps, TPMA gaps, detector cutoffs, and model-independent intrinsic signed gaps.

### Direct-marker reconstruction

The merged Figure 2 ledger contains

```text
70 direct experimental markers
9 measured-composition specimen series
17 axis-calibration references
0 Figure 5 numerical observations
0 Equation (3) curve samples
0 fitted model parameters.
```

The measured compositions are

```text
0.23, 0.25, 0.31, 0.35, 0.385, 0.405, 0.46, 0.53, 0.61.
```

The coordinate-extraction half-widths are

```text
+/-1.75 K
+/-4.7 meV.
```

They are deterministic digitization bounds, not measurement covariance. The source flags remain attached to `x=0.25`, `0.385`, and `0.53`; `x=0.61` remains direct evidence but lies outside Scott Equation (3)'s stated `x<=0.6` range.

### Temperature-coefficient test

Every specimen receives an unconstrained intercept. The compared slopes are

```text
S0  independent centered slope per specimen
S1  b(x) = b0 + b1 x
SH  b_H(x) = 5.35e-4 (1 - 2x) eV/K.
```

Across all nine specimens, the S1 central fit is numerically close to Hansen:

```text
S1 b0 =  5.49783543e-4 eV/K
S1 b1 = -1.076209537e-3 eV/K per x
SH b0 =  5.35e-4 eV/K
SH b1 = -1.07e-3 eV/K per x.
```

That proximity does not pass the predeclared deterministic box and held-out gates:

```text
full S1 maximum normalized box residual  1.483597188054
full SH maximum normalized box residual  1.820916077360
full S1 held-out maximum                 2.305028838147
full SH held-out maximum                 1.820916077360.
```

The controlling unflagged within-range core is

```text
x = {0.23, 0.31, 0.35, 0.405, 0.46}
41 markers
5 specimens.
```

Its results are

```text
S1 b0                               6.03872734e-4 eV/K
S1 b1                              -1.235286852e-3 eV/K per x
S1 maximum normalized box residual  1.418088512811
S1 maximum held-out residual        1.628014211258
SH maximum normalized box residual  1.820916077360
SH maximum held-out residual        1.820916077360.
```

Neither S1 nor SH is completely box-feasible. Hansen's coefficient pair remains inside the nonprobabilistic S1 linearized sensitivity envelope:

```text
b0 in [ 3.91485115e-4,  8.16260353e-4] eV/K
b1 in [-1.809474839e-3, -6.61098865e-4] eV/K per x.
```

The controlling decision is therefore

```text
non_identifiable_at_figure_precision.
```

This does not validate or reject Hansen's absolute polynomial and does not establish a fixed-alpha correction coefficient. Marker-energy extraction dominates the coefficient sensitivity, so further polynomial flexibility would fit publication-coordinate detail without resolving the observation operator or experimental covariance.

### Final Scott authorization state

```text
source metrology and specimen registry          validated
Figure 2 fixed-alpha marker ledger              validated
specimen-centered central slopes                validated
deterministic box qualification                 validated
leave-one-specimen-out prediction               validated
Hansen temperature-coefficient compatibility    unresolved
fixed-alpha observation-specific correction     unresolved
absolute Hansen polynomial validation           not authorized
new universal HgCdTe equation                    not authorized.
```

The Scott path is closed under current public source precision. Reopening requires a materially higher-resolution or source-native numerical record with adequate uncertainty semantics. It must not be reopened by sampling Equation (3) or Figure 5, adding nonlinear temperature terms to manufacture compatibility, substituting fit-required compositions, treating extraction bounds as covariance, or pooling incompatible measurement classes.

'''
              text = text[:start] + scott_section + text[end:]
          else:
              assert replacement_header in text

          stale_unresolved = (
              '- whether calibrated Scott Figure 2/5 markers can be recovered '
              'from a rendered source asset;'
          )
          resolved_unresolved = (
              '- whether a materially higher-resolution or source-native Scott '
              'record could distinguish Hansen compatibility from a fixed-alpha '
              'observation-specific correction; the reconstructed publication '
              'markers are non-identifying at their declared precision;'
          )
          if stale_unresolved in text:
              text = text.replace(stale_unresolved, resolved_unresolved, 1)

          stale_comparison = (
              '- whether the Hansen/Camassel discrepancy persists when compared '
              'against Scott’s historical `alpha=500 cm^-1` observation '
              'definition rather than an exciton-conditioned gap;'
          )
          resolved_comparison = (
              '- what independently constrained observation operator can relate '
              'Scott fixed-alpha edges to Camassel exciton-conditioned gaps '
              'without using the unresolved Scott slope comparison as a bridge;'
          )
          if stale_comparison in text:
              text = text.replace(stale_comparison, resolved_comparison, 1)

          text = text.replace(
              '- obtain a rendered Scott 1969 asset and apply a calibrated '
              'Figure 2/5 digitization gate;\n',
              '',
              1,
          )
          text = text.replace(
              '- obtain additional independently composed temperature series or '
              'author data;',
              '- obtain additional independently composed public numerical '
              'temperature series with explicit uncertainty semantics;',
              1,
          )
          text = text.replace(
              '- independent validation of Hansen by Scott 1969;',
              '- validation or rejection of Hansen’s absolute polynomial or '
              'temperature coefficient by Scott 1969;',
              1,
          )

          forbidden = (
              '### Fail-closed digitization state',
              'Figure 2/5 numerical reconstruction remains blocked',
              'obtain a rendered Scott 1969 asset',
              'author data;',
          )
          for phrase in forbidden:
              assert phrase not in text, phrase
          assert text.count('non_identifiable_at_figure_precision') >= 2
          assert '#303 — Scott 1969 Figure 2 fixed-alpha marker reconstruction;' in text
          assert '#312 — Scott 1969 fixed-alpha temperature-coefficient test;' in text
          path.write_text(text, encoding='utf-8')
          PY

          if git diff --quiet -- research/programs/empirical_bandgap/state.md; then
            echo 'R01 state already reconciled'
          else
            git diff --check
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add research/programs/empirical_bandgap/state.md
            git commit -m 'Reconcile Scott result in R01 state'
            git push origin HEAD:"$TARGET_REF"
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scott-temperature-coefficient-validation
          path: |
            /tmp/scott-temperature-coefficient-tests.log
            /tmp/scott-temperature-coefficient-a.json
            research/programs/empirical_bandgap/state.md
          if-no-files-found: error
          retention-days: 30
