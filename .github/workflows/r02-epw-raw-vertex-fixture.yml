name: r02-epw-raw-vertex-fixture

on:
  pull_request:
    paths:
      - '.github/workflows/r02-epw-raw-vertex-fixture.yml'
      - 'first_principles/b0/r02_epw_raw_vertex_fixture_contract.json'
      - 'first_principles/b0/r02_epw_raw_vertex_fixture_harness_stop_29962340413.json'
      - 'first_principles/b0/r02_epw_raw_vertex_source_qualification_result.json'
      - 'patches/qe76-epw61-r02-raw-vertex-export.patch'
      - 'tools/run_epw_raw_vertex_fixture_ci.sh'
      - 'tools/analyze_epw_raw_vertex_fixture.py'
      - 'tools/select_epw_fixture_stdout.py'
      - 'tests/test_r02_epw_raw_vertex_source_gate.py'
      - 'tests/test_r02_epw_raw_vertex_analyzer.py'
      - 'tests/test_select_epw_fixture_stdout.py'
  workflow_dispatch:

concurrency:
  group: r02-epw-raw-vertex-fixture-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  one-pinned-build-two-identical-fixtures:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      OMP_NUM_THREADS: '1'
      OPENBLAS_NUM_THREADS: '1'
      MKL_NUM_THREADS: '1'
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install compiler and numerical dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential gfortran git make perl python3-pip \
            libblas-dev liblapack-dev libfftw3-dev
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Execute one pinned build and two identical fixture sequences
        run: bash tools/run_epw_raw_vertex_fixture_ci.sh

      - name: Upload complete fixture evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r02-epw-raw-vertex-fixture-evidence
          path: r02-epw-raw-vertex-fixture-evidence
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
