name: r02-epw-raw-vertex-fixture

on:
  pull_request:
    paths:
      - '.github/workflows/r02-epw-raw-vertex-fixture.yml'
      - 'first_principles/b0/r02_epw_raw_vertex_fixture_contract.json'
      - 'first_principles/b0/r02_epw_raw_vertex_fixture_harness_stop_29962340413.json'
      - 'first_principles/b0/r02_epw_raw_vertex_fixture_terminal_harness_stop_29971955581.json'
      - 'tools/run_epw_raw_vertex_fixture_ci.sh'
      - 'tools/select_epw_fixture_stdout.py'
      - 'tests/test_r02_epw_raw_vertex_source_gate.py'
      - 'tests/test_select_epw_fixture_stdout.py'
  workflow_dispatch:

concurrency:
  group: r02-epw-raw-vertex-fixture-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frozen-terminal-harness-stop:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install focused test dependency
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Verify fail-closed fixture state
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          contract = json.loads(
              Path(
                  "first_principles/b0/r02_epw_raw_vertex_fixture_contract.json"
              ).read_text()
          )
          assert contract["phase"] == "terminal_harness_stop"
          auth = contract["authorization"]
          assert auth["qe_epw_build"] is False
          assert auth["upstream_fixture_execution"] is False
          assert auth["observational_export_patch_application"] is False
          assert auth["additional_fixture_execution"] is False
          assert auth["automatic_retry"] is False
          assert auth["design_only_followup"] is True
          PY
          python -m pytest -vv \
            tests/test_select_epw_fixture_stdout.py \
            tests/test_r02_epw_raw_vertex_source_gate.py
