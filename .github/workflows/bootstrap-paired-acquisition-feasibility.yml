name: bootstrap-paired-acquisition-feasibility

on:
  pull_request:
    paths:
      - '.github/workflows/bootstrap-paired-acquisition-feasibility.yml'
      - 'data/templates/hgcdte_paired_gap_feasibility_template.json'
      - 'tools/audit_hgcdte_paired_gap_feasibility.py'
      - 'tests/test_hgcdte_paired_gap_feasibility.py'
      - 'protocols/hgcdte_paired_gap_collaboration_feasibility.md'
      - 'research/decision_records/2026-07-20-paired-acquisition-feasibility.md'

permissions:
  contents: write

jobs:
  freeze:
    runs-on: ubuntu-24.04
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Enforce explicit full-plan promotion and update program ledger
        run: |
          python - <<'PY'
          from pathlib import Path

          audit_path = Path('tools/audit_hgcdte_paired_gap_feasibility.py')
          text = audit_path.read_text(encoding='utf-8')
          old_full = '''    full = data["full_experiment_plan"]
              expected_full = {
                  "specimen_count": 8,
                  "modality_count": 2,
                  "temperature_block_count": 2,
                  "primary_observation_count": 32,
                  "technical_replicate_hard_minimum": 2,
                  "status": "blocked_pending_prescreening",
              }
              if full != expected_full:
                  raise ValueError("full experiment plan changed or was prematurely promoted")
          '''
          new_full = '''    full = data["full_experiment_plan"]
              expected_full_fields = {
                  "specimen_count": 8,
                  "modality_count": 2,
                  "temperature_block_count": 2,
                  "primary_observation_count": 32,
                  "technical_replicate_hard_minimum": 2,
              }
              if any(full.get(key) != value for key, value in expected_full_fields.items()):
                  raise ValueError("full experiment design changed")
              if full.get("status") not in {"blocked_pending_prescreening", "ready"}:
                  raise ValueError("invalid full experiment plan status")
          '''
          if text.count(old_full) != 1:
              raise SystemExit('unexpected full-plan validation anchor')
          text = text.replace(old_full, new_full, 1)

          old_ready = '    full_ready = prescreening_ready and prescreening_pass\n'
          new_ready = (
              '    full_ready = (\n'
              '        prescreening_ready\n'
              '        and prescreening_pass\n'
              '        and data["full_experiment_plan"].get("status") == "ready"\n'
              '    )\n'
          )
          if text.count(old_ready) != 1:
              raise SystemExit('unexpected full-readiness anchor')
          text = text.replace(old_ready, new_ready, 1)

          old_blocker = '''    if prescreening_ready and not prescreening_pass:
                  blockers.extend(prescreening_blockers)
          '''
          new_blocker = old_blocker + '''    if (
                  prescreening_ready
                  and prescreening_pass
                  and data["full_experiment_plan"].get("status") != "ready"
              ):
                  blockers.append("full_experiment:plan_not_promoted")
          '''
          if text.count(old_blocker) != 1:
              raise SystemExit('unexpected full-readiness blocker anchor')
          text = text.replace(old_blocker, new_blocker, 1)
          audit_path.write_text(text, encoding='utf-8')

          test_path = Path('tests/test_hgcdte_paired_gap_feasibility.py')
          tests = test_path.read_text(encoding='utf-8')
          old_test = '''def _make_full_ready(payload: dict) -> None:
              _make_prescreening_ready(payload)
              payload["prescreening_result"] = {
          '''
          new_test = '''def _make_full_ready(payload: dict) -> None:
              _make_prescreening_ready(payload)
              payload["full_experiment_plan"]["status"] = "ready"
              payload["prescreening_result"] = {
          '''
          if tests.count(old_test) != 1:
              raise SystemExit('unexpected full-ready test anchor')
          test_path.write_text(tests.replace(old_test, new_test, 1), encoding='utf-8')

          progress_path = Path('research/active_progress.md')
          progress = progress_path.read_text(encoding='utf-8')
          anchor = (
              'Historical-source accumulation is closed. New work must secure '
              'protocol-compliant paired evidence or recover a native primary dataset whose '
              'information gain exceeds the current composition and observation-model '
              'uncertainty scales.\n\n'
          )
          insert = anchor + (
              'Issue #161 adds the controlling external-collaboration readiness layer. It '
              'separates documented capability review, a two-specimen/eight-observation '
              'logistics pilot, measured candidate-pool pre-screening, and the full '
              'eight-specimen experiment. The empty planning package is intentionally '
              '`not_ready`; no partner, access, cost, or schedule is assumed.\n\n'
          )
          if progress.count(anchor) != 1:
              raise SystemExit('unexpected active-progress feasibility anchor')
          progress_path.write_text(progress.replace(anchor, insert, 1), encoding='utf-8')
          PY

      - name: Run focused feasibility audit
        run: |
          set -o pipefail
          python -m pip install -e . pytest
          python tools/audit_hgcdte_paired_gap_feasibility.py \
            --input-json data/templates/hgcdte_paired_gap_feasibility_template.json \
            --output-json data/derived/hgcdte_paired_gap_feasibility_reference_audit.json
          pytest -vv tests/test_hgcdte_paired_gap_feasibility.py \
            2>&1 | tee /tmp/paired-feasibility-pytest.txt
          python tools/audit_hgcdte_paired_gap_feasibility.py \
            --input-json data/templates/hgcdte_paired_gap_feasibility_template.json \
            --output-json /tmp/paired-feasibility-audit.json
          cmp data/derived/hgcdte_paired_gap_feasibility_reference_audit.json \
              /tmp/paired-feasibility-audit.json

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paired-acquisition-feasibility
          path: |
            /tmp/paired-feasibility-pytest.txt
            /tmp/paired-feasibility-audit.json
          if-no-files-found: warn
          retention-days: 7

      - name: Freeze feasibility record
        run: |
          rm -f .github/workflows/bootstrap-paired-acquisition-feasibility.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Freeze paired-acquisition feasibility gates'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
