name: bootstrap-chang2006-figure2-readiness

on:
  pull_request:
    paths:
      - '.github/workflows/bootstrap-chang2006-figure2-readiness.yml'
      - 'data/evidence/chang2006_figure2_readiness.json'
      - 'tools/audit_chang2006_figure2_readiness.py'
      - 'tests/test_chang2006_figure2_readiness.py'
      - 'research/decision_records/2026-07-20-chang2006-figure2-readiness.md'

permissions:
  contents: write

jobs:
  freeze:
    runs-on: ubuntu-24.04
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Update controlling program ledger
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('research/active_progress.md')
          text = path.read_text(encoding='utf-8')
          chang_anchor = (
              '- The Chang candidate is an observation-model sensitivity operator, not a '
              'material-gap law. Free joint fitting of `W`, `b`, and `Eg` is not authorized '
              'in the current tranche.\n'
          )
          chang_replacement = chang_anchor + (
              '- Chang 2006 Figure 2 is not authorized as a quantitative operator '
              'validation dataset: the caption reports `80 K` while the body reports '
              '`77 K`, native numerical data and calibration are absent, and same-specimen '
              '`W` and `b` are not tabulated. The reported `b=103+/-2 meV` belongs to a '
              'separate `x=0.23`, `77 K` calculation and cannot be transferred as exact '
              'for the `x=0.21` figure.\n'
              '- A declared synthetic Figure-2-like screen gives a weighted Jacobian '
              'condition number of `255.7`, `corr(Eg,ln W)=0.731`, and '
              '`corr(Eg,ln b)=0.801`. Fixed `W` errors of `+/-10-20%` move the recovered '
              'edge by approximately `0.8-1.7 meV` while retaining visually small '
              'residuals. These are sensitivity diagnostics, not real-specimen '
              'uncertainties.\n'
          )
          if text.count(chang_anchor) != 1:
              raise SystemExit('Chang Figure 2 ledger anchor changed')
          text = text.replace(chang_anchor, chang_replacement, 1)

          next_old = (
              '1. Use the paired protocol as the external collaboration handoff and obtain '
              'a documented feasibility review from candidate material, composition, '
              'Hall/defect, absorption, and magneto-optical partners.\n'
              '2. Build a pre-screening pool large enough to achieve two separated carrier '
              'levels and two separated vacancy-proxy levels without changing carrier '
              'polarity or exceeding the carrier-vacancy correlation gate.\n'
              '3. Prioritize existing paired or same-specimen cross-modality evidence only '
              'when specimen lineage, measured composition, carrier state, vacancy proxy, '
              'temperature, and extraction provenance are recoverable.\n'
              '4. The Herrmann implementation path is blocked until Anderson 1977/1980, '
              'the full 1992 precursor, explicit `BFF_lh`/`BFF_hh`, carrier-density to '
              'quasi-Fermi mapping, and composition-dependent Kane conventions are '
              'recovered and jointly audited.\n'
              '5. Reopen material-law development only after independent '
              'observation-class-controlled evidence exceeds propagated composition and '
              'measurement uncertainty and remains stable under leave-one-specimen-out '
              'analysis.\n'
          )
          next_new = (
              '1. Use the paired protocol as the external collaboration handoff and obtain '
              'a documented feasibility review from candidate material, composition, '
              'Hall/defect, absorption, and magneto-optical partners.\n'
              '2. Build a pre-screening pool large enough to achieve two separated carrier '
              'levels and two separated vacancy-proxy levels without changing carrier '
              'polarity or exceeding the carrier-vacancy correlation gate.\n'
              '3. Recover native Chang 2006 Figure 2 absorption data, calibration, resolved '
              'temperature, and same-specimen `W` and `b` provenance before any '
              'quantitative operator validation or gap inference.\n'
              '4. Prioritize existing paired or same-specimen cross-modality evidence only '
              'when specimen lineage, measured composition, carrier state, vacancy proxy, '
              'temperature, and extraction provenance are recoverable.\n'
              '5. The Herrmann implementation path is blocked until Anderson 1977/1980, '
              'the full 1992 precursor, explicit `BFF_lh`/`BFF_hh`, carrier-density to '
              'quasi-Fermi mapping, and composition-dependent Kane conventions are '
              'recovered and jointly audited.\n'
              '6. Reopen material-law development only after independent '
              'observation-class-controlled evidence exceeds propagated composition and '
              'measurement uncertainty and remains stable under leave-one-specimen-out '
              'analysis.\n'
          )
          if text.count(next_old) != 1:
              raise SystemExit('authorized-next-work block changed')
          text = text.replace(next_old, next_new, 1)

          unauthorized_anchor = (
              '- single-edge selection from the uncertainty ensemble;\n'
          )
          unauthorized_new = unauthorized_anchor + (
              '- quantitative gap inference or operator validation from Chang 2006 Figure '
              '2 without native data, resolved temperature, and same-specimen `W` and `b`;\n'
              '- transferring the reported `x=0.23` Chang value of `b` as an exact input '
              'for the `x=0.21` Figure 2 specimen;\n'
          )
          if text.count(unauthorized_anchor) != 1:
              raise SystemExit('unauthorized-work anchor changed')
          text = text.replace(unauthorized_anchor, unauthorized_new, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Run focused readiness audit
        run: |
          set -o pipefail
          python -m pip install -e . pytest
          pytest -vv tests/test_chang2006_figure2_readiness.py \
            2>&1 | tee /tmp/chang2006-figure2-pytest.txt
          python tools/audit_chang2006_figure2_readiness.py \
            --input-json data/evidence/chang2006_figure2_readiness.json \
            --output-json /tmp/chang2006-figure2-audit.json

      - name: Upload readiness diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chang2006-figure2-readiness
          path: |
            /tmp/chang2006-figure2-pytest.txt
            /tmp/chang2006-figure2-audit.json
          if-no-files-found: warn
          retention-days: 7

      - name: Freeze readiness record
        run: |
          rm -f .github/workflows/bootstrap-chang2006-figure2-readiness.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Record Chang 2006 Figure 2 readiness gate'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
