name: absorption-observation-source-recovery

on:
  pull_request:
    paths:
      - '.github/workflows/absorption-observation-source-recovery.yml'
      - 'data/evidence/hgcdte_absorption_observation_source_recovery.csv'
      - 'data/evidence/hgcdte_absorption_figure_digitization_manifest.csv'
      - 'tools/audit_absorption_observation_source_recovery.py'
      - 'tests/test_absorption_observation_source_recovery.py'
      - 'research/active_progress.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install package
        run: python -m pip install -e ".[test]"

      - name: Execute modern absorption evidence audit
        run: |
          mkdir -p absorption-observation-source-evidence
          python -m tools.audit_absorption_observation_source_recovery \
            --sources-csv data/evidence/hgcdte_absorption_observation_source_recovery.csv \
            --manifest-csv data/evidence/hgcdte_absorption_figure_digitization_manifest.csv \
            --output-json absorption-observation-source-evidence/result.json \
            > absorption-observation-source-evidence/stdout.txt \
            2> absorption-observation-source-evidence/stderr.txt
          python -m pytest -q tests/test_absorption_observation_source_recovery.py \
            > absorption-observation-source-evidence/pytest.txt \
            2> absorption-observation-source-evidence/pytest-stderr.txt

      - name: Record environment and hashes
        if: always()
        run: |
          python --version > absorption-observation-source-evidence/python-version.txt
          find absorption-observation-source-evidence -type f ! -name sha256.txt -print0 \
            | sort -z | xargs -0 sha256sum \
            > absorption-observation-source-evidence/sha256.txt

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: absorption-observation-source-evidence
          path: absorption-observation-source-evidence
          if-no-files-found: error
          retention-days: 30
