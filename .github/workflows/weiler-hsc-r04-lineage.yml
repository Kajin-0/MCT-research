name: weiler-hsc-r04-lineage

on:
  pull_request:
    paths:
      - '.github/workflows/weiler-hsc-r04-lineage.yml'
      - 'tools/sync_weiler_hsc_r04_state.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  synchronize:
    if: github.head_ref == 'agent/weiler1981-hsc-r04-lineage'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/weiler1981-hsc-r04-lineage
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Apply guarded R01 state transformation
        run: python tools/sync_weiler_hsc_r04_state.py
      - name: Commit state and remove temporary synchronizers
        shell: bash
        run: |
          set -euo pipefail
          git rm tools/sync_weiler_hsc_r04_state.py
          git rm .github/workflows/sync-weiler-hsc-r04-state.yml
          git add research/programs/empirical_bandgap/state.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Synchronize R01 state with Weiler HSC_R04 lineage'
          git push origin HEAD:agent/weiler1981-hsc-r04-lineage
