name: r04-manuscript-architecture

on:
  pull_request:
    paths:
      - '.github/workflows/r04-manuscript-architecture.yml'
      - 'manuscript/r04/manuscript_architecture.md'
      - 'manuscript/r04/claim_ledger.json'
      - 'manuscript/r04/figure_plan.json'
      - 'manuscript/r04/abstract_plan.json'
      - 'research/decision_records/2026-07-23-r04-manuscript-architecture.md'
      - 'tests/test_r04_manuscript_architecture.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install tests
        run: python -m pip install pytest

      - name: Run focused architecture tests
        run: python -m pytest -q tests/test_r04_manuscript_architecture.py

      - name: Verify architecture decision and scope ceiling
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          claims = json.loads(Path('manuscript/r04/claim_ledger.json').read_text())
          figures = json.loads(Path('manuscript/r04/figure_plan.json').read_text())
          abstract = json.loads(Path('manuscript/r04/abstract_plan.json').read_text())
          architecture = Path('manuscript/r04/manuscript_architecture.md').read_text()
          decision = Path(
              'research/decision_records/2026-07-23-r04-manuscript-architecture.md'
          ).read_text()

          assert len(figures['figures']) == 4
          assert figures['main_figure_ceiling'] == 4
          assert figures['new_scientific_calculations_authorized'] is False
          assert len(claims['claims']) == 15
          assert claims['final_claim_audit_required_before_submission'] is True
          assert 'ARCHITECTURE_READY_FOR_DRAFTING' in architecture
          assert 'ARCHITECTURE_READY_FOR_DRAFTING' in decision
          assert 'submission                                       not authorized' in decision
          assert abstract['status'] == 'structured_plan_not_final_prose'
          assert set(abstract) == {
              'schema_version',
              'program',
              'issue',
              'status',
              'problem',
              'method',
              'analytical_result',
              'real_map_demonstration',
              'limitation',
              'practical_consequence',
          }
          PY
