name: groves-state-sync

on:
  push:
    branches:
      - agent/groves1967-signed-endpoint-audit
    paths:
      - '.github/workflows/groves-state-sync.yml'

permissions:
  contents: write

jobs:
  synchronize:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: agent/groves1967-signed-endpoint-audit
      - name: Update canonical R01 state
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('research/programs/empirical_bandgap/state.md')
          text = path.read_text(encoding='utf-8')

          if '#273 — Groves 1967 signed HgTe magnetoreflection endpoint audit.' not in text:
              anchor = '- #269 — Blue 1964 signed-gap non-commensurability certificate.\n'
              assert anchor in text
              text = text.replace(
                  anchor,
                  '- #269 — Blue 1964 signed-gap non-commensurability certificate;\n'
                  '- #273 — Groves 1967 signed HgTe magnetoreflection endpoint audit.\n',
                  1,
              )
          if 'provenance-controlled Groves 1967 signed HgTe endpoint' not in text:
              anchor = '- executable Blue 1964 signed-gap non-commensurability certificate with zero fitted parameters and zero correction coefficients.\n'
              assert anchor in text
              text = text.replace(
                  anchor,
                  '- executable Blue 1964 signed-gap non-commensurability certificate with zero fitted parameters and zero correction coefficients;\n'
                  '- provenance-controlled Groves 1967 signed HgTe endpoint and conditional Kane-parameter audit.\n',
                  1,
              )

          stale = (
              'The focused certificate workflow passes exact source assertions, immutable JSON regeneration, '
              'zero-fit/zero-correction enforcement, and the tranche file boundary. Complete Python 3.11 and '
              '3.13 suites pass with `988` tests on the audited pre-ledger certificate head.\n\n'
              'A final CI run is required on this state-ledger commit before Issue #269 is closed.\n'
          )
          closed = (
              'The focused certificate workflow passes exact source assertions, immutable JSON regeneration, '
              'zero-fit/zero-correction enforcement, and the tranche file boundary. Complete Python 3.11 and '
              '3.13 suites pass with `988` tests on the audited final certificate head. Issue #269 is closed as '
              'a completed observation-contract result.\n'
          )
          if stale in text:
              text = text.replace(stale, closed, 1)

          if '## Groves 1967 signed HgTe magnetoreflection endpoint audit' not in text:
              section = '''## Groves 1967 signed HgTe magnetoreflection endpoint audit

Issue #273 and draft PR #274 establish a provenance-controlled signed HgTe endpoint from interband magnetoreflection.

Canonical source files are:

```text
data/experimental/groves1967_source_metadata.csv
data/experimental/groves1967_band_parameter_ledger.csv
data/experimental/groves1967_README.md
```

The primary PDF is available in the user File Library as `groves1967.pdf`. The source binary is not materialized in the active runtime, so the SHA256 remains explicitly unavailable.

### Signed observable and band-ordering convention

Groves, Brown, and Pidgeon observed high-energy `Gamma6 -> Gamma8` and lower-energy `Gamma8 -> Gamma8` magnetoreflection transition families. The high-energy transitions were fitted with a coupled `Gamma6-Gamma7-Gamma8` Kane/Luttinger magnetic-field model.

The stored observable is

```text
signed_Gamma6_minus_Gamma8_interaction_gap
E_g = E(Gamma6) - E(Gamma8)
E_g < 0 means inverted ordering
```

The source's zero thermal-energy gap at the cubic `Gamma8` degeneracy remains distinct from the finite negative `Gamma6-Gamma8` interaction gap. These two quantities must not be collapsed into one gap definition.

### Published fit and conditional parameter set

The abstract-level fitted values are

```text
E_g = -0.283 +/- 0.001 eV
E_p = 18 +/- 1 eV
```

The source states that the quoted errors reflect uncertainty in the higher-band parameters. They are not pointwise experimental Gaussian standard deviations and no transition-level covariance matrix is reported.

The representative detailed calculation retains

```text
E_g = -0.2833 eV
E_p = 18.13 eV
Delta = 1.0 eV
H1 = -5.0
G = -1.0
L_prime = -2.0
A_prime = 0
M = -5.0
L_minus_M_minus_N = 7.0
```

This is a conditional historical parameterization for the declared higher-band assumptions. It is not an independently measured universal modern eight-band parameter vector. No `P` value is derived from `E_p` in this tranche because the conversion requires an explicit convention and constants.

### Temperature ledger

The note added in proof says the paper's `0.283 eV` value was estimated to have been determined at approximately

```text
30 K.
```

This is stored as a source-note estimate, not a directly logged setpoint.

The same note reports continued measurements giving

```text
|E_g| near 0.30 eV at 1.5 K.
```

Only the magnitude is printed in that statement. The source interpretation remains inverted, but the repository does not silently replace the printed magnitude with a newly reported signed value. The two statements do not identify a temperature law.

A later Cu-doped Ge detector operated at `4.2 K`. That detector temperature is not assigned to the sample or to the main fit. The primary fit must not be relabeled as 4.2 K or 5.5 K.

### Specimen, protocol, and figure boundary

The magnetoreflection specimen was high-purity but polycrystalline HgTe, slowly grown by Bridgman in an Hg-rich environment at approximately `0.25 cm/day`. Reflected light sampled several orientations. The sample was mounted on a helium-Dewar cold finger, and attempts near `77 K` did not resolve the oscillations.

The reflective surface was prepared with a `5-10%` bromine-in-methanol etch followed by a methanol rinse. Measurements used fixed photon energy with magnetic-field sweeps; increasing- and decreasing-field resonance positions were averaged to reduce response-time error.

Figures 4 and 5 contain experimental points and theoretical curves, but this tranche contains no calibrated marker coordinates, inferred point count, sampled theory curve, or refitted transition data.

### Admissibility and validation state

Groves 1967 is not one of the reconstructed Hansen 22 fitted alloy studies. It is an endpoint/sign source, not a composition series. It can anchor the inverted sign of HgTe under its declared magnetoreflection model, but it cannot determine alloy bowing or independently validate a complete `E_g(x,T)` law.

The focused Groves workflow verifies the exact signed values, the conditional detailed parameter set, the 30 K/1.5 K/4.2 K separation, specimen and protocol metadata, absent covariance, absent Figure 4/5 ledgers, and the tranche file boundary. Complete Python 3.11 and 3.13 suites pass with `996` tests on the audited pre-ledger Groves head.

A final CI run is required on this state-ledger commit before Issue #273 is closed.

'''
              marker = '## Unresolved scientific questions\n'
              assert marker in text
              text = text.replace(marker, section + marker, 1)

          if 'whether calibrated Groves Figure 4/5 transition markers' not in text:
              anchor = '- whether the Blue `28%` abstract limit and printed `32%` row can be resolved from another primary asset or author record;\n'
              assert anchor in text
              text = text.replace(
                  anchor,
                  anchor
                  + '- whether calibrated Groves Figure 4/5 transition markers can be reconstructed with detector/run labels and experimental uncertainty separated from the fitted curves;\n'
                  + '- whether the approximate Groves 30 K and 1.5 K endpoint statements can be independently reproduced before any HgTe endpoint temperature law is inferred;\n',
                  1,
              )

          old = 'The Seiler, Camassel, Scott, Blue source reconstruction, and Blue non-commensurability certificate do not authorize manuscript writing by themselves.'
          if old in text:
              text = text.replace(
                  old,
                  'The Seiler, Camassel, Scott, Blue, and Groves source results do not authorize manuscript writing by themselves.',
                  1,
              )
          if 'apply a calibrated Groves Figure 4/5 digitization gate' not in text:
              anchor = '- obtain a rendered Scott 1969 asset and apply a calibrated Figure 2/5 digitization gate;\n'
              assert anchor in text
              text = text.replace(
                  anchor,
                  anchor + '- apply a calibrated Groves Figure 4/5 digitization gate only if transition-family, detector/run, field, and energy uncertainties can be retained;\n',
                  1,
              )
          if 'compare published HgTe endpoint values only after' not in text:
              anchor = '- seek an independent low-temperature static-composition source that is not in the Camassel/Laurenti lineage;\n'
              assert anchor in text
              text = text.replace(
                  anchor,
                  anchor + '- compare published HgTe endpoint values only after signed-observable convention and source temperature are aligned;\n',
                  1,
              )

          if "treating Groves's approximate `30 K`" not in text:
              anchor = '- sampling Blue’s theoretical curves and presenting the samples as observations;\n'
              assert anchor in text
              text = text.replace(
                  anchor,
                  anchor
                  + "- treating Groves's approximate `30 K` main-fit assignment as an exact logged sample setpoint;\n"
                  + "- assigning the Cu-doped Ge detector's `4.2 K` operating temperature to the HgTe sample;\n"
                  + '- converting the proof-update magnitude `|E_g| near 0.30 eV` into a newly printed signed datum without an explicit inference label;\n'
                  + '- fitting a Groves endpoint temperature law from the approximate 30 K and 1.5 K statements;\n'
                  + '- treating the Groves detailed higher-band parameter set as a universal modern eight-band parameter vector;\n'
                  + "- deriving or publishing a `P` value from Groves's `E_p` without an explicit convention and constants;\n"
                  + '- treating Groves 1967 as an alloy composition-series validation or bowing constraint;\n'
                  + '- claiming that Groves Figure 4 or Figure 5 has been digitized on the current branch;\n'
                  + "- treating Groves's quoted parameter errors as pointwise experimental covariance;\n",
                  1,
              )

          old = '- treating theory-conditioned positive optical-fit parameter, fixed-alpha optical edge, optical cutoff, PL peak, TPMA gap, reflectivity exciton-polariton gap, absorption excitonic gap, and intrinsic signed gap as interchangeable;'
          if old in text:
              text = text.replace(
                  old,
                  '- treating theory-conditioned positive optical-fit parameter, fixed-alpha optical edge, optical cutoff, PL peak, TPMA gap, interband-magnetoreflection interaction gap, reflectivity exciton-polariton gap, absorption excitonic gap, zero thermal gap, and intrinsic signed gap as interchangeable;',
                  1,
              )

          required = (
              '#273 — Groves 1967 signed HgTe magnetoreflection endpoint audit',
              '## Groves 1967 signed HgTe magnetoreflection endpoint audit',
              'Complete Python 3.11 and 3.13 suites pass with `996` tests',
              'A final CI run is required on this state-ledger commit before Issue #273 is closed.',
              'Issue #269 is closed as a completed observation-contract result.',
          )
          missing = [token for token in required if token not in text]
          if missing:
              raise SystemExit(f'missing synchronized state tokens: {missing}')
          path.write_text(text, encoding='utf-8', newline='\n')
          PY
      - name: Commit state ledger
        shell: bash
        run: |
          if git diff --quiet -- research/programs/empirical_bandgap/state.md; then
            echo 'No state change required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add research/programs/empirical_bandgap/state.md
          git commit -m 'Synchronize R01 state with Groves endpoint audit'
          git push origin HEAD:agent/groves1967-signed-endpoint-audit
