name: Groves 1971 HSC_R11 primary-source audit

on:
  pull_request:
    paths:
      - "data/hansen/groves1971_hsc_r11_source_metadata.csv"
      - "data/hansen/groves1971_sample_record.csv"
      - "data/hansen/groves1971_measurement_states.csv"
      - "data/hansen/groves1971_transition_summary.csv"
      - "data/hansen/groves1971_model_parameters.csv"
      - "data/hansen/groves1971_model_assumptions.csv"
      - "data/hansen/groves1971_hansen_ingestion_candidates.csv"
      - "data/hansen/groves1971_hsc_r11_README.md"
      - "data/hansen/hansen_1982_source_graph.csv"
      - "data/validation/groves1971_hsc_r11_audit.json"
      - "tools/audit_groves1971_hsc_r11.py"
      - "tests/test_groves1971_hsc_r11_primary_audit.py"
      - ".github/workflows/groves1971-hsc-r11-primary-audit.yml"
      - "research/programs/empirical_bandgap/state_updates/2026-07-24-groves1971-hsc-r11-primary-audit.md"
  push:
    branches: [main]
    paths:
      - "data/hansen/groves1971_hsc_r11_source_metadata.csv"
      - "data/hansen/groves1971_sample_record.csv"
      - "data/hansen/groves1971_measurement_states.csv"
      - "data/hansen/groves1971_transition_summary.csv"
      - "data/hansen/groves1971_model_parameters.csv"
      - "data/hansen/groves1971_model_assumptions.csv"
      - "data/hansen/groves1971_hansen_ingestion_candidates.csv"
      - "data/hansen/groves1971_hsc_r11_README.md"
      - "data/hansen/hansen_1982_source_graph.csv"
      - "data/validation/groves1971_hsc_r11_audit.json"
      - "tools/audit_groves1971_hsc_r11.py"
      - "tests/test_groves1971_hsc_r11_primary_audit.py"
      - ".github/workflows/groves1971-hsc-r11-primary-audit.yml"
      - "research/programs/empirical_bandgap/state_updates/2026-07-24-groves1971-hsc-r11-primary-audit.md"

permissions:
  contents: read

jobs:
  primary-source-audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install focused test dependency
        run: python -m pip install --disable-pip-version-check pytest
      - name: Verify Groves primary-source reconstruction
        run: python -m pytest -q tests/test_groves1971_hsc_r11_primary_audit.py
      - name: Regenerate immutable audit
        shell: bash
        run: |
          set -euo pipefail
          python tools/audit_groves1971_hsc_r11.py > /tmp/groves-audit.json
          cmp /tmp/groves-audit.json data/validation/groves1971_hsc_r11_audit.json
