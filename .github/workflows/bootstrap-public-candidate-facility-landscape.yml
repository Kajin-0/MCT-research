name: bootstrap-public-candidate-facility-landscape

on:
  pull_request:
    paths:
      - '.github/workflows/bootstrap-public-candidate-facility-landscape.yml'
      - 'data/evidence/hgcdte_paired_gap_public_candidate_landscape.json'
      - 'tools/audit_hgcdte_public_candidate_landscape.py'
      - 'tests/test_hgcdte_public_candidate_landscape.py'
      - 'protocols/hgcdte_paired_gap_candidate_contact_questions.md'
      - 'research/decision_records/2026-07-20-public-candidate-facility-landscape.md'

permissions:
  contents: write

jobs:
  freeze:
    runs-on: ubuntu-24.04
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Update active program boundary
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('research/active_progress.md')
          text = path.read_text(encoding='utf-8')
          anchor = (
              'Issue #161 adds the controlling external-collaboration readiness layer. It '
              'separates documented capability review, a two-specimen/eight-observation '
              'logistics pilot, measured candidate-pool pre-screening, and the full '
              'eight-specimen experiment. The empty planning package is intentionally '
              '`not_ready`; no partner, access, cost, or schedule is assumed.\n\n'
          )
          insert = anchor + (
              'Issue #163 maps eight public-evidence-only candidate facilities across all '
              'seven external capability roles. Public webpages confirm no role or hard '
              'gate, so the PR #162 package remains `not_ready`. The first contact sequence '
              'is UIC Microphysics Laboratory, National MagLab, Washington State University '
              'PAS, UT Austin EPMA, and UT Knoxville Hall. The accessed MagLab page lists '
              '`2026-11-13` as the next proposal deadline; this is a planning date, not '
              'reserved access.\n\n'
          )
          if text.count(anchor) != 1:
              raise SystemExit('unexpected public-candidate active-progress anchor')
          path.write_text(text.replace(anchor, insert, 1), encoding='utf-8')
          PY

      - name: Run focused candidate-landscape audit
        run: |
          set -o pipefail
          python -m pip install -e . pytest
          python tools/audit_hgcdte_public_candidate_landscape.py \
            --input-json data/evidence/hgcdte_paired_gap_public_candidate_landscape.json \
            --output-json data/derived/hgcdte_paired_gap_public_candidate_landscape_reference_audit.json
          pytest -vv tests/test_hgcdte_public_candidate_landscape.py \
            2>&1 | tee /tmp/public-candidate-landscape-pytest.txt
          python tools/audit_hgcdte_public_candidate_landscape.py \
            --input-json data/evidence/hgcdte_paired_gap_public_candidate_landscape.json \
            --output-json /tmp/public-candidate-landscape-audit.json
          cmp data/derived/hgcdte_paired_gap_public_candidate_landscape_reference_audit.json \
              /tmp/public-candidate-landscape-audit.json

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-candidate-facility-landscape
          path: |
            /tmp/public-candidate-landscape-pytest.txt
            /tmp/public-candidate-landscape-audit.json
          if-no-files-found: warn
          retention-days: 7

      - name: Freeze candidate landscape
        run: |
          rm -f .github/workflows/bootstrap-public-candidate-facility-landscape.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Freeze public candidate facility landscape'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
