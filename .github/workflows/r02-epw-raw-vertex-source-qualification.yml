name: r02-epw-raw-vertex-source-qualification

on:
  pull_request:
    paths:
      - '.github/workflows/r02-epw-raw-vertex-source-qualification.yml'
      - 'first_principles/b0/r02_epw_raw_vertex_fixture_contract.json'
      - 'first_principles/b0/r02_epw_raw_vertex_source_qualification_result.json'
      - 'first_principles/b0/r02_epw_raw_vertex_fixture_terminal_harness_stop_29971955581.json'
      - 'tests/test_r02_epw_raw_vertex_source_gate.py'
  workflow_dispatch:

concurrency:
  group: r02-epw-raw-vertex-source-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frozen-source-record:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install focused test dependency
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Validate immutable source and terminal records
        run: python -m pytest -vv tests/test_r02_epw_raw_vertex_source_gate.py
