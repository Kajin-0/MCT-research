name: r02-epw-raw-vertex-source-qualification

on:
  pull_request:
    paths:
      - '.github/workflows/r02-epw-raw-vertex-source-qualification.yml'
      - 'first_principles/b0/r02_epw_raw_vertex_fixture_contract.json'
      - 'research/capability_audits/qe76_epw61_raw_vertex_fixture_selection.md'
      - 'tools/qualify_epw_raw_vertex_sources.sh'
      - 'tests/test_r02_epw_raw_vertex_source_gate.py'
  workflow_dispatch:

concurrency:
  group: r02-epw-raw-vertex-source-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  qualify-upstream-bytes:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install focused test dependency
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Validate fail-closed source gate
        run: |
          mkdir -p r02-epw-raw-vertex-source-evidence/validated
          set -o pipefail
          python -m pytest -vv tests/test_r02_epw_raw_vertex_source_gate.py 2>&1 \
            | tee r02-epw-raw-vertex-source-evidence/validated/focused-pytest.txt

      - name: Clone exact source and calculate immutable hashes
        run: bash tools/qualify_epw_raw_vertex_sources.sh

      - name: Upload source qualification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r02-epw-raw-vertex-source-evidence
          path: r02-epw-raw-vertex-source-evidence
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
