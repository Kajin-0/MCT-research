name: flagship-journal-submission-gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install
        run: python -m pip install -e '.[test]'
      - name: Run journal and evidence-threshold tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p flagship-journal-submission-gate
          python -m pytest -q \
            tests/test_flagship_journal_submission_gate.py \
            tests/test_flagship_novelty_boundary.py \
            tests/test_distributional_band_edge_manuscript_assets.py \
            2>&1 | tee flagship-journal-submission-gate/pytest.txt
      - name: Preserve decision records
        run: |
          cp data/validation/flagship_journal_submission_gate.json flagship-journal-submission-gate/
          cp manuscript/distributional_band_edge/references_verified.json flagship-journal-submission-gate/
          cp research/decision_records/2026-07-21-flagship-journal-and-evidence-threshold.md flagship-journal-submission-gate/
          cp manuscript/distributional_band_edge/journal_submission/semiconductor_science_and_technology.md flagship-journal-submission-gate/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flagship-journal-submission-gate
          path: flagship-journal-submission-gate
          if-no-files-found: error
          retention-days: 30
