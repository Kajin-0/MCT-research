name: cdte-a0-stricter-response

on:
  pull_request:
    paths:
      - '.github/workflows/cdte-a0-stricter-response.yml'
      - 'first_principles/a0/cdte_a0_stricter_response_contract.json'
      - 'first_principles/a0/cdte_a0_run_spec.json'
      - 'first_principles/a0/cdte_pseudopotential_selection.json'
      - 'first_principles/a0/cdte_a0_first_point_audit_contract.json'
      - 'first_principles/a0/cdte_a0_first_point_audit_reference_result.json'
      - 'first_principles/a0/templates/cdte_qe_scf_stricter_response.in.template'
      - 'first_principles/a0/templates/cdte_qe_ph_gamma_stricter_response.in.template'
      - 'tools/check_cdte_a0_readiness.py'
      - 'tools/render_first_principles_input.py'
      - 'tools/render_cdte_a0_runtime_inputs.py'
      - 'tools/render_cdte_a0_stricter_response.py'
      - 'tools/extract_qe_ks_energies.py'
      - 'tools/audit_cdte_a0_first_point.py'
      - 'tools/compare_cdte_a0_response_diagnostic.py'
      - 'tools/run_cdte_a0_stricter_response_ci.sh'
      - 'tests/test_cdte_a0_stricter_response.py'
  workflow_dispatch:

concurrency:
  group: cdte-a0-stricter-response-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install build and analysis dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential gfortran make cmake git ca-certificates \
            python3-venv python3-pip python3-numpy pkg-config file time \
            libopenblas-dev liblapack-dev libfftw3-dev
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Execute and audit one stricter response point
        run: bash tools/run_cdte_a0_stricter_response_ci.sh

      - name: Upload stricter-response evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cdte-a0-stricter-response-evidence
          path: cdte-a0-stricter-response-evidence
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
