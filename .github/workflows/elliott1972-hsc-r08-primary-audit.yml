name: Elliott 1972 HSC_R08 primary-source audit

on:
  pull_request:
    paths:
      - "data/hansen/elliott1972_hsc_r08_source_metadata.csv"
      - "data/hansen/elliott1972_hsc_r08_README.md"
      - "data/hansen/elliott1972_specimens.csv"
      - "data/hansen/elliott1972_table1_carriers.csv"
      - "data/hansen/elliott1972_table2_gap_candidates.csv"
      - "data/hansen/elliott1972_model_parameters.csv"
      - "data/hansen/elliott1972_hansen_ingestion_candidates.csv"
      - "data/hansen/hansen_1982_source_graph.csv"
      - "data/validation/elliott1972_hsc_r08_audit.json"
      - "tools/audit_elliott1972_hsc_r08.py"
      - "tests/test_elliott1972_hsc_r08_primary_audit.py"
      - ".github/workflows/elliott1972-hsc-r08-primary-audit.yml"
      - "research/programs/empirical_bandgap/state_updates/2026-07-23-elliott1972-hsc-r08-primary-audit.md"
  push:
    branches:
      - main
    paths:
      - "data/hansen/elliott1972_hsc_r08_source_metadata.csv"
      - "data/hansen/elliott1972_hsc_r08_README.md"
      - "data/hansen/elliott1972_specimens.csv"
      - "data/hansen/elliott1972_table1_carriers.csv"
      - "data/hansen/elliott1972_table2_gap_candidates.csv"
      - "data/hansen/elliott1972_model_parameters.csv"
      - "data/hansen/elliott1972_hansen_ingestion_candidates.csv"
      - "data/hansen/hansen_1982_source_graph.csv"
      - "data/validation/elliott1972_hsc_r08_audit.json"
      - "tools/audit_elliott1972_hsc_r08.py"
      - "tests/test_elliott1972_hsc_r08_primary_audit.py"
      - ".github/workflows/elliott1972-hsc-r08-primary-audit.yml"
      - "research/programs/empirical_bandgap/state_updates/2026-07-23-elliott1972-hsc-r08-primary-audit.md"

permissions:
  contents: read

jobs:
  primary-source-audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install focused test dependency
        run: python -m pip install --disable-pip-version-check pytest
      - name: Verify Elliott primary-source reconstruction
        run: python -m pytest -q tests/test_elliott1972_hsc_r08_primary_audit.py
      - name: Regenerate immutable audit
        shell: bash
        run: |
          set -euo pipefail
          python tools/audit_elliott1972_hsc_r08.py > /tmp/elliott-audit.json
          cmp /tmp/elliott-audit.json data/validation/elliott1972_hsc_r08_audit.json
