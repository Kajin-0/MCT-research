name: spatial-disorder-theorem

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install package
        run: python -m pip install -e '.[test]'
      - name: Verify spatial-disorder layers
        shell: bash
        run: |
          set -o pipefail
          mkdir -p spatial-disorder-diagnostics
          python -m pytest -q \
            tests/test_spatial_disorder.py \
            tests/test_spatial_disorder_depth.py \
            tests/test_spatial_disorder_inference.py \
            tests/test_spatial_disorder_theorems.py \
            tests/test_spatial_disorder_optics.py \
            tests/test_spatial_disorder_cutoff.py \
            tests/test_spatial_disorder_design.py \
            tests/test_spatial_disorder_calibration.py \
            tests/test_spatial_disorder_covariance_families.py \
            tests/test_spatial_disorder_covariance_bias.py \
            tests/test_spatial_disorder_posterior.py \
            2>&1 | tee spatial-disorder-diagnostics/pytest.txt
      - name: Rebuild nonlinear posterior reference
        run: |
          python -m tools.build_nonlinear_common_scale_posterior_reference \
            --output spatial-disorder-diagnostics/nonlinear_common_scale_posterior.json
          cmp \
            data/validation/nonlinear_common_scale_posterior.json \
            spatial-disorder-diagnostics/nonlinear_common_scale_posterior.json
      - name: Validate immutable references
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          theorem_path = Path('data/validation/spatial_disorder_theorem_extension.json')
          theorem = json.loads(theorem_path.read_text(encoding='utf-8'))
          assert theorem['schema_version'] == '1.0'
          assert theorem['program_issue'] == 196
          assert theorem['status'] == 'analytical_sensitivity_not_specimen_calibration'
          case = theorem['declared_hgcdte_sensitivity_case']
          assert len(case['probe_results']) == 4
          assert case['headline']['apparent_standard_deviation_ratio'] > 27.0
          designs = theorem['conditioning_examples']
          assert min(item['condition_number'] for item in designs) < 3.0
          assert max(item['condition_number'] for item in designs) > 1000.0
          restrictions = theorem['claim_restrictions']
          assert any('established mathematics' in item for item in restrictions)
          assert any('not a specimen fit' in item for item in restrictions)

          calibration_path = Path(
              'data/validation/spatial_disorder_probe_scale_calibration.json'
          )
          calibration = json.loads(calibration_path.read_text(encoding='utf-8'))
          assert calibration['schema_version'] == '1.0'
          assert calibration['program_issue'] == 196
          assert calibration['implementation_issue'] == 215
          assert (
              calibration['status']
              == 'analytical_sensitivity_not_specimen_calibration'
          )
          common = calibration['common_scale_calibration_case']
          assert common['maximum_absolute_identity_residual'] < 1.0e-15
          assert abs(common['parameter_standard_deviation_inflation'][0] - 1.0) < 1.0e-12
          assert common['parameter_standard_deviation_inflation'][1] > 1.0
          independent = calibration['independent_scale_error_case']
          assert all(
              value > 1.0
              for value in independent['parameter_standard_deviation_inflation']
          )
          restrictions = calibration['claim_restrictions']
          assert any('not a specimen fit' in item for item in restrictions)
          assert any('not a global nonlinear posterior' in item for item in restrictions)

          family_path = Path('data/validation/three_scale_covariance_family_test.json')
          family = json.loads(family_path.read_text(encoding='utf-8'))
          assert family['schema_version'] == '1.0'
          assert family['issue'] == 218
          assert family['portfolio_contribution'] == 'R04'
          assert family['status'].endswith('not_specimen_covariance')
          three_scale = family['three_scale_reference']['families']
          assert len(three_scale) == 3
          assert three_scale[0]['standardized_reciprocal_residual'] > 4.0
          assert three_scale[-1]['standardized_reciprocal_residual'] < 1.5
          six_scale = family['six_scale_reference']['families']
          assert six_scale[0]['reduced_chi_square'] > 10.0
          assert six_scale[-1]['reduced_chi_square'] < 2.0
          assert any(
              'Failure to reject' in item
              for item in family['claim_boundaries']
          )

          bias_path = Path(
              'data/validation/spatial_disorder_covariance_family_bias.json'
          )
          bias = json.loads(bias_path.read_text(encoding='utf-8'))
          assert bias['schema_version'] == '1.0'
          assert bias['program_issue'] == 196
          assert bias['implementation_issue'] == 224
          assert bias['extends_issue'] == 218
          assert bias['portfolio_contribution'] == 'R04'
          assert bias['status'].endswith('not_specimen_covariance')
          broad = bias['five_scale_broad_design']['families']
          assert broad['gaussian']['correlation_length_spread_ratio'] < 1.0 + 1.0e-12
          assert broad['matern_0.5']['correlation_length_spread_ratio'] > 3.0
          assert (
              broad['matern_0.5']['rms_log_error']
              > broad['matern_1.5']['rms_log_error']
              > broad['matern_2.5']['rms_log_error']
              > 0.0
          )
          assert broad['matern_0.5']['point_variance_bias_ratio'] < 0.9
          assert any(
              'does not duplicate' in item
              for item in bias['claim_boundaries']
          )

          posterior_path = Path(
              'data/validation/nonlinear_common_scale_posterior.json'
          )
          posterior = json.loads(posterior_path.read_text(encoding='utf-8'))
          assert posterior['schema_version'] == '1.0'
          assert posterior['issue'] == 220
          assert posterior['portfolio_contribution'] == 'R04'
          assert posterior['status'].endswith('not_specimen_inference')
          errors = [
              item['relative_frobenius_covariance_error']
              for item in posterior['fisher_comparison']
          ]
          assert errors == sorted(errors)
          assert errors[-1] < 0.02
          common_cases = posterior['common_calibration_cases']
          assert max(
              abs(item['variance_addition_residual'])
              for item in common_cases
          ) < 1.0e-15
          assert all(
              item['cross_covariance_residual'] == 0.0
              for item in common_cases
          )
          broad = posterior['bounded_prior_cases']['broad']
          narrow = posterior['bounded_prior_cases']['narrow']
          assert abs(broad['variance_addition_residual']) < 1.0e-15
          assert narrow['absolute_log_length_boundary_mass'] > 0.1
          assert abs(narrow['variance_addition_residual']) > 1.0e-3
          assert any(
              'not specimen inference' in item.lower()
              for item in posterior['claim_boundaries']
          )
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spatial-disorder-theorem
          path: |
            spatial-disorder-diagnostics
            data/validation/spatial_disorder_theorem_extension.json
            data/validation/spatial_disorder_probe_scale_calibration.json
            data/validation/three_scale_covariance_family_test.json
            data/validation/spatial_disorder_covariance_family_bias.json
            data/validation/nonlinear_common_scale_posterior.json
            docs/derivations/010_scale_dependent_spatial_disorder.md
            docs/derivations/011_probe_scale_calibration_limit.md
            docs/derivations/012_three_scale_covariance_family_test.md
            docs/derivations/013_exact_common_scale_posterior.md
            docs/derivations/014_covariance_family_bias_and_pairwise_drift.md
            literature/notes/scale_dependent_disorder_prior_art.md
          if-no-files-found: warn
          retention-days: 30
