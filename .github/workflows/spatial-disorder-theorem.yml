name: spatial-disorder-theorem

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install package
        run: python -m pip install -e '.[test]'
      - name: Verify all spatial-disorder layers
        run: |
          python -m pytest -q \
            tests/test_spatial_disorder.py \
            tests/test_spatial_disorder_depth.py \
            tests/test_spatial_disorder_inference.py \
            tests/test_spatial_disorder_theorems.py \
            tests/test_spatial_disorder_optics.py \
            tests/test_spatial_disorder_cutoff.py \
            tests/test_spatial_disorder_design.py \
            tests/test_spatial_disorder_calibration.py
      - name: Validate immutable references
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          theorem_path = Path('data/validation/spatial_disorder_theorem_extension.json')
          theorem = json.loads(theorem_path.read_text(encoding='utf-8'))
          assert theorem['schema_version'] == '1.0'
          assert theorem['program_issue'] == 196
          assert theorem['status'] == 'analytical_sensitivity_not_specimen_calibration'
          case = theorem['declared_hgcdte_sensitivity_case']
          assert len(case['probe_results']) == 4
          assert case['headline']['apparent_standard_deviation_ratio'] > 27.0
          designs = theorem['conditioning_examples']
          assert min(item['condition_number'] for item in designs) < 3.0
          assert max(item['condition_number'] for item in designs) > 1000.0
          restrictions = theorem['claim_restrictions']
          assert any('established mathematics' in item for item in restrictions)
          assert any('not a specimen fit' in item for item in restrictions)

          calibration_path = Path('data/validation/probe_scale_calibration_limits.json')
          calibration = json.loads(calibration_path.read_text(encoding='utf-8'))
          assert calibration['schema_version'] == '1.0'
          assert calibration['issue'] == 215
          assert calibration['portfolio_contribution'] == 'R04'
          common = calibration['common_calibration_reference']
          assert common['uncalibrated_common_mode']['rank'] == 1
          assert common['standard_deviation_inflation'][0] == 1.0
          assert common['standard_deviation_inflation'][1] > 3.0
          independent = calibration['independent_calibration_reference']
          assert min(independent['standard_deviation_inflation']) > 1.0
          assert calibration['status'].endswith('not_specimen_calibration')
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: spatial-disorder-theorem
          path: |
            data/validation/spatial_disorder_theorem_extension.json
            data/validation/probe_scale_calibration_limits.json
            docs/derivations/010_scale_dependent_spatial_disorder.md
            docs/derivations/011_probe_scale_calibration_limits.md
            literature/notes/scale_dependent_disorder_prior_art.md
          if-no-files-found: error
          retention-days: 30
