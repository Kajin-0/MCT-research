name: bootstrap-chang2006-progress-ledger

on:
  pull_request:
    paths:
      - '.github/workflows/bootstrap-chang2006-progress-ledger.yml'
      - 'research/decision_records/2026-07-20-chang2006-absorption-operator.md'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-24.04
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Update controlling absorption contract
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('research/active_progress.md')
          text = path.read_text(encoding='utf-8')
          old = (
              '- The candidate ensemble includes fractional-power models and fixed thresholds. '
              'The prior-art Chu 1994 Kane-region model may be enabled within '
              '`0.170 <= x <= 0.443` and `77 <= T <= 300 K`.\n'
              '- The exporter never selects a recommended or corrected material gap.\n'
              '- Deterministic seven-candidate example: combined span `19.95223 meV`, '
              'model-family span `9.14375 meV`, threshold span `9.95726 meV`, and '
              'half-range `9.97612 meV`.\n'
              '- Research uncertainty export is authorized. Production correction and '
              'single-edge selection remain forbidden.\n'
          )
          new = (
              '- The candidate ensemble includes fractional-power models and fixed thresholds. '
              'The prior-art Chu 1994 Kane-region model may be enabled within '
              '`0.170 <= x <= 0.443` and `77 <= T <= 300 K`.\n'
              '- The Chang 2006 nonparabolic-Urbach operator may be enabled only within '
              '`0.21 <= x <= 0.23`, `77 <= T <= 80 K`, and '
              '`-0.020 <= E-Eg <= 0.300 eV`. It requires explicit provenance-bound `W` and '
              '`b`, continuity normalization at `E0=Eg+W/2`, and separate tail/intrinsic '
              'branch coverage.\n'
              '- The Chang candidate is an observation-model sensitivity operator, not a '
              'material-gap law. Free joint fitting of `W`, `b`, and `Eg` is not authorized '
              'in the current tranche.\n'
              '- The exporter never selects a recommended or corrected material gap.\n'
              '- Deterministic seven-candidate example: combined span `19.95223 meV`, '
              'model-family span `9.14375 meV`, threshold span `9.95726 meV`, and '
              'half-range `9.97612 meV`. This example remains unchanged because the new '
              'candidate is disabled by default.\n'
              '- Research uncertainty export is authorized. Production correction and '
              'single-edge selection remain forbidden.\n'
          )
          if text.count(old) != 1:
              raise SystemExit('absorption-contract ledger anchor changed')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Freeze ledger update
        run: |
          rm -f .github/workflows/bootstrap-chang2006-progress-ledger.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Record Chang 2006 observation operator boundary'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
