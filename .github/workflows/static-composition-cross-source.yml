name: static-composition-cross-source

on:
  pull_request:
    paths:
      - '.github/workflows/static-composition-cross-source.yml'
      - 'data/experimental/chu_sher_2008_table4_4_room_temperature_gap.csv'
      - 'src/mct_research/historical_gap_models.py'
      - 'tools/analyze_static_composition_cross_source.py'
      - 'tests/test_static_composition_cross_source.py'
      - 'data/experimental/seiler1990_table2_low_temperature_magneto_optical.csv'
      - 'src/mct_research/gap_models.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install package
        run: python -m pip install -e ".[test]"

      - name: Execute cross-source static composition audit
        run: |
          mkdir -p static-composition-cross-source-evidence
          python -m tools.analyze_static_composition_cross_source \
            --chu-csv data/experimental/chu_sher_2008_table4_4_room_temperature_gap.csv \
            --seiler-csv data/experimental/seiler1990_table2_low_temperature_magneto_optical.csv \
            --output-json static-composition-cross-source-evidence/result.json \
            > static-composition-cross-source-evidence/stdout.txt \
            2> static-composition-cross-source-evidence/stderr.txt
          python -m pytest -q tests/test_static_composition_cross_source.py \
            > static-composition-cross-source-evidence/pytest.txt \
            2> static-composition-cross-source-evidence/pytest-stderr.txt

      - name: Record environment and hashes
        if: always()
        run: |
          python --version > static-composition-cross-source-evidence/python-version.txt
          find static-composition-cross-source-evidence -type f ! -name sha256.txt -print0 \
            | sort -z | xargs -0 sha256sum \
            > static-composition-cross-source-evidence/sha256.txt

      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-composition-cross-source-evidence
          path: static-composition-cross-source-evidence
          if-no-files-found: error
          retention-days: 30
