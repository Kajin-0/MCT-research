name: zg-selected-band-matrix-oracle

on:
  pull_request:
    paths:
      - '.github/workflows/zg-selected-band-matrix-oracle.yml'
      - 'first_principles/matrix_oracle/zg_selected_band_matrix_reconstruction_contract.json'
      - 'tools/run_zg_selected_band_matrix_oracle.py'
      - 'tests/test_zg_selected_band_matrix_oracle.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  oracle:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install package
        run: python -m pip install -e ".[test]"

      - name: Execute ZG matrix reconstruction oracle
        run: |
          mkdir -p zg-selected-band-matrix-evidence
          python tools/run_zg_selected_band_matrix_oracle.py \
            --contract first_principles/matrix_oracle/zg_selected_band_matrix_reconstruction_contract.json \
            --output-json zg-selected-band-matrix-evidence/result.json \
            > zg-selected-band-matrix-evidence/stdout.txt
          python -m pytest -q tests/test_zg_selected_band_matrix_oracle.py \
            > zg-selected-band-matrix-evidence/pytest.txt

      - name: Record environment and hashes
        if: always()
        run: |
          python --version > zg-selected-band-matrix-evidence/python-version.txt
          find zg-selected-band-matrix-evidence -type f ! -name sha256.txt -print0 \
            | sort -z | xargs -0 sha256sum \
            > zg-selected-band-matrix-evidence/sha256.txt

      - name: Upload oracle evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zg-selected-band-matrix-evidence
          path: zg-selected-band-matrix-evidence
          if-no-files-found: error
          retention-days: 30
