name: scott-source-audit

on:
  pull_request:
    paths:
      - '.github/workflows/scott-source-audit.yml'
      - 'data/experimental/scott1969_README.md'
      - 'data/experimental/scott1969_figure1_specimens.csv'
      - 'data/experimental/scott1969_source_metadata.csv'
      - 'data/experimental/scott1969_figure2_digitized.csv'
      - 'data/experimental/scott1969_figure2_calibration.csv'
      - 'data/experimental/scott1969_figure2_extraction_gate.csv'
      - 'research/programs/empirical_bandgap/state.md'
      - 'tests/test_scott1969_source_audit.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install package
        run: python -m pip install -e '.[test]'
      - name: Validate Scott source audit
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q tests/test_scott1969_source_audit.py \
            2>&1 | tee /tmp/scott-source-audit-pytest.log
      - name: Assert source and digitization boundary
        shell: bash
        run: |
          python - <<'PY'
          import csv
          from collections import Counter
          from pathlib import Path

          root = Path('.')
          data = root / 'data/experimental'
          metadata = list(csv.DictReader(
              (data / 'scott1969_source_metadata.csv').open(
                  newline='', encoding='utf-8'
              )
          ))
          specimens = list(csv.DictReader(
              (data / 'scott1969_figure1_specimens.csv').open(
                  newline='', encoding='utf-8'
              )
          ))
          markers = list(csv.DictReader(
              (data / 'scott1969_figure2_digitized.csv').open(
                  newline='', encoding='utf-8'
              )
          ))
          assert len(metadata) == 1
          assert len(specimens) == 10
          assert metadata[0]['source_pdf_sha256'] == (
              '7b2e5790745897ecd75bd22134e5d9293397820c3b7851eb5a9e648a5c441324'
          )
          assert metadata[0]['pointwise_energy_covariance'] == 'not_reported'
          assert all(row['pointwise_gap_ev'] == '' for row in specimens)
          assert all(row['pointwise_gap_uncertainty_ev'] == '' for row in specimens)
          assert len(markers) == 70
          assert Counter(row['specimen_label'] for row in markers) == {
              '61': 8,
              '53': 6,
              '46': 9,
              '40.5': 8,
              '38.5': 8,
              '35': 8,
              '31': 8,
              '25': 7,
              '23': 8,
          }
          assert not (data / 'scott1969_figure5_digitized.csv').exists()
          PY
      - name: Assert tranche file boundary
        if: github.head_ref == 'agent/scott1969-source-audit'
        shell: bash
        run: |
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" \
            | sort > /tmp/changed-files.txt
          cat > /tmp/allowed-files.txt <<'EOF'
          .github/workflows/camassel-composition-envelope.yml
          .github/workflows/scott-source-audit.yml
          data/experimental/scott1969_README.md
          data/experimental/scott1969_figure1_specimens.csv
          data/experimental/scott1969_source_metadata.csv
          research/programs/empirical_bandgap/state.md
          tests/test_scott1969_source_audit.py
          EOF
          sort -o /tmp/allowed-files.txt /tmp/allowed-files.txt
          unexpected=$(comm -23 /tmp/changed-files.txt /tmp/allowed-files.txt)
          if [ -n "$unexpected" ]; then
            printf 'Unexpected changed files:\n%s\n' "$unexpected"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scott-source-audit
          path: |
            /tmp/scott-source-audit-pytest.log
            data/experimental/scott1969_source_metadata.csv
            data/experimental/scott1969_figure1_specimens.csv
            data/experimental/scott1969_README.md
            data/experimental/scott1969_figure2_extraction_gate.csv
            data/experimental/scott1969_figure2_calibration.csv
            data/experimental/scott1969_figure2_digitized.csv
            research/programs/empirical_bandgap/state.md
          if-no-files-found: error
          retention-days: 30
