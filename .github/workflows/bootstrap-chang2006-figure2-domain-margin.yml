name: bootstrap-chang2006-figure2-domain-margin

on:
  pull_request:
    paths:
      - '.github/workflows/bootstrap-chang2006-figure2-domain-margin.yml'
      - 'data/evidence/chang2006_figure2_readiness.json'
      - 'tests/test_chang2006_figure2_readiness.py'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Enforce domain margin and regenerate records
        run: |
          python - <<'PY'
          from pathlib import Path

          audit_path = Path('tools/audit_chang2006_figure2_readiness.py')
          text = audit_path.read_text(encoding='utf-8')
          old_import = '''from mct_research.chang_2006_absorption import (
              chang_2006_absorption_shape,
              fit_chang_2006_nonparabolic_urbach_edge,
          )
          '''
          new_import = '''from mct_research.chang_2006_absorption import (
              CHANG_2006_RELATIVE_ENERGY_RANGE_EV,
              chang_2006_absorption_shape,
              fit_chang_2006_nonparabolic_urbach_edge,
          )
          '''
          if text.count(old_import) != 1:
              raise SystemExit('unexpected Chang audit import anchor')
          text = text.replace(old_import, new_import, 1)

          old_energy = '''    energy = _energy_grid(screen["energy_segments"])
              absorption = amplitude * chang_2006_absorption_shape(
          '''
          new_energy = '''    energy = _energy_grid(screen["energy_segments"])
              declared_upper_margin = float(screen["source_domain_upper_margin_at_truth_eV"])
              actual_upper_margin = float(
                  CHANG_2006_RELATIVE_ENERGY_RANGE_EV[1] - (float(np.max(energy)) - edge)
              )
              if declared_upper_margin <= 0.0 or not math.isclose(
                  actual_upper_margin,
                  declared_upper_margin,
                  rel_tol=0.0,
                  abs_tol=1.0e-12,
              ):
                  raise ValueError("synthetic source-domain upper margin changed")
              absorption = amplitude * chang_2006_absorption_shape(
          '''
          if text.count(old_energy) != 1:
              raise SystemExit('unexpected Chang audit energy anchor')
          text = text.replace(old_energy, new_energy, 1)

          old_output = '''        "synthetic_point_count": int(energy.size),
              "synthetic_tail_point_count_at_truth": int(
          '''
          new_output = '''        "synthetic_point_count": int(energy.size),
              "synthetic_source_domain_upper_margin_eV": actual_upper_margin,
              "synthetic_tail_point_count_at_truth": int(
          '''
          if text.count(old_output) != 1:
              raise SystemExit('unexpected Chang audit output anchor')
          text = text.replace(old_output, new_output, 1)
          audit_path.write_text(text, encoding='utf-8')

          decision_path = Path(
              'research/decision_records/2026-07-20-chang2006-figure2-readiness.md'
          )
          decision = decision_path.read_text(encoding='utf-8')
          replacements = {
              '105 spectral points from 0.088 to 0.400 eV': (
                  '105 spectral points from 0.088 to 0.398 eV\n'
                  'upper source-domain margin at truth = 0.002 eV'
              ),
              'condition number                    255.688': (
                  'condition number                    256.114'
              ),
              ' -5%          -0.470 meV': ' -5%          -0.465 meV',
          }
          for old, new in replacements.items():
              if decision.count(old) != 1:
                  raise SystemExit(f'unexpected decision-record anchor: {old}')
              decision = decision.replace(old, new, 1)
          decision_path.write_text(decision, encoding='utf-8')

          progress_path = Path('research/active_progress.md')
          progress = progress_path.read_text(encoding='utf-8')
          old_progress = (
              '- A declared synthetic Figure-2-like screen gives a weighted Jacobian '
              'condition number of `255.7`, `corr(Eg,ln W)=0.731`, and '
              '`corr(Eg,ln b)=0.801`.'
          )
          new_progress = (
              '- A declared synthetic Figure-2-like screen, with a `0.002 eV` upper '
              'source-domain margin, gives a weighted Jacobian condition number of '
              '`256.1`, `corr(Eg,ln W)=0.731`, and `corr(Eg,ln b)=0.801`.'
          )
          if progress.count(old_progress) != 1:
              raise SystemExit('unexpected active-progress Figure 2 anchor')
          progress = progress.replace(old_progress, new_progress, 1)
          progress_path.write_text(progress, encoding='utf-8')
          PY

      - name: Run focused readiness audit
        run: |
          set -o pipefail
          python -m pip install -e . pytest
          pytest -vv tests/test_chang2006_figure2_readiness.py \
            2>&1 | tee /tmp/chang2006-figure2-pytest.txt
          python tools/audit_chang2006_figure2_readiness.py \
            --input-json data/evidence/chang2006_figure2_readiness.json \
            --output-json /tmp/chang2006-figure2-audit.json

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chang2006-figure2-domain-margin
          path: |
            /tmp/chang2006-figure2-pytest.txt
            /tmp/chang2006-figure2-audit.json
          if-no-files-found: warn
          retention-days: 7

      - name: Freeze corrected readiness record
        run: |
          rm -f .github/workflows/bootstrap-chang2006-figure2-domain-margin.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Enforce Chang Figure 2 source-domain margin'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
