name: bootstrap-chang2006-figure2-domain-margin

on:
  pull_request:
    paths:
      - '.github/workflows/bootstrap-chang2006-figure2-domain-margin.yml'
      - 'data/evidence/chang2006_figure2_readiness.json'
      - 'tests/test_chang2006_figure2_readiness.py'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Enforce domain margin and regenerate records
        run: |
          python - <<'PY'
          from pathlib import Path

          audit_path = Path('tools/audit_chang2006_figure2_readiness.py')
          text = audit_path.read_text(encoding='utf-8')

          import_anchor = '    chang_2006_absorption_shape,\n'
          import_insert = (
              '    CHANG_2006_RELATIVE_ENERGY_RANGE_EV,\n'
              + import_anchor
          )
          if text.count(import_anchor) != 1:
              raise SystemExit('unexpected Chang audit import line')
          if 'CHANG_2006_RELATIVE_ENERGY_RANGE_EV' not in text:
              text = text.replace(import_anchor, import_insert, 1)

          energy_anchor = '    energy = _energy_grid(screen["energy_segments"])\n'
          energy_insert = energy_anchor + '''    declared_upper_margin = float(
              screen["source_domain_upper_margin_at_truth_eV"]
          )
              actual_upper_margin = float(
                  CHANG_2006_RELATIVE_ENERGY_RANGE_EV[1] - (float(np.max(energy)) - edge)
              )
              if declared_upper_margin <= 0.0 or not math.isclose(
                  actual_upper_margin,
                  declared_upper_margin,
                  rel_tol=0.0,
                  abs_tol=1.0e-12,
              ):
                  raise ValueError("synthetic source-domain upper margin changed")
          '''
          if text.count(energy_anchor) != 1:
              raise SystemExit('unexpected Chang audit energy line')
          if 'declared_upper_margin = float(' not in text:
              text = text.replace(energy_anchor, energy_insert, 1)

          output_anchor = '        "synthetic_point_count": int(energy.size),\n'
          output_insert = output_anchor + (
              '        "synthetic_source_domain_upper_margin_eV": actual_upper_margin,\n'
          )
          if text.count(output_anchor) != 1:
              raise SystemExit('unexpected Chang audit output line')
          if '"synthetic_source_domain_upper_margin_eV"' not in text:
              text = text.replace(output_anchor, output_insert, 1)
          audit_path.write_text(text, encoding='utf-8')

          decision_path = Path(
              'research/decision_records/2026-07-20-chang2006-figure2-readiness.md'
          )
          decision = decision_path.read_text(encoding='utf-8')
          simple_replacements = [
              ('105 spectral points from 0.088 to 0.400 eV',
               '105 spectral points from 0.088 to 0.398 eV\nupper source-domain margin at truth = 0.002 eV'),
              ('condition number                    255.688',
               'condition number                    256.114'),
              ('-0.470 meV', '-0.465 meV'),
          ]
          for old, new in simple_replacements:
              if decision.count(old) != 1:
                  raise SystemExit(f'unexpected decision-record token: {old}')
              decision = decision.replace(old, new, 1)
          decision_path.write_text(decision, encoding='utf-8')

          progress_path = Path('research/active_progress.md')
          progress = progress_path.read_text(encoding='utf-8')
          progress_replacements = [
              ('A declared synthetic Figure-2-like screen gives',
               'A declared synthetic Figure-2-like screen, with a `0.002 eV` upper source-domain margin, gives'),
              ('condition number of `255.7`', 'condition number of `256.1`'),
          ]
          for old, new in progress_replacements:
              if progress.count(old) != 1:
                  raise SystemExit(f'unexpected active-progress token: {old}')
              progress = progress.replace(old, new, 1)
          progress_path.write_text(progress, encoding='utf-8')
          PY

      - name: Run focused readiness audit
        run: |
          set -o pipefail
          python -m pip install -e . pytest
          pytest -vv tests/test_chang2006_figure2_readiness.py \
            2>&1 | tee /tmp/chang2006-figure2-pytest.txt
          python tools/audit_chang2006_figure2_readiness.py \
            --input-json data/evidence/chang2006_figure2_readiness.json \
            --output-json /tmp/chang2006-figure2-audit.json

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chang2006-figure2-domain-margin
          path: |
            /tmp/chang2006-figure2-pytest.txt
            /tmp/chang2006-figure2-audit.json
          if-no-files-found: warn
          retention-days: 7

      - name: Freeze corrected readiness record
        run: |
          rm -f .github/workflows/bootstrap-chang2006-figure2-domain-margin.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Enforce Chang Figure 2 source-domain margin'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
