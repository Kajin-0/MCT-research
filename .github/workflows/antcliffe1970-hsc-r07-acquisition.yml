name: Antcliffe 1970 HSC_R07 primary-source audit

on:
  pull_request:
    paths:
      - "data/hansen/antcliffe1970_hsc_r07_source_metadata.csv"
      - "data/hansen/antcliffe1970_hsc_r07_README.md"
      - "data/hansen/antcliffe1970_specimens.csv"
      - "data/hansen/antcliffe1970_gap_observations.csv"
      - "data/hansen/antcliffe1970_band_parameters.csv"
      - "data/hansen/antcliffe1970_hansen_ingestion_candidates.csv"
      - "data/hansen/hansen_1982_source_graph.csv"
      - "data/validation/antcliffe1970_hsc_r07_audit.json"
      - "tools/audit_antcliffe1970_hsc_r07.py"
      - "tests/test_antcliffe1970_hsc_r07_acquisition.py"
      - ".github/workflows/antcliffe1970-hsc-r07-acquisition.yml"
      - "research/programs/empirical_bandgap/state_updates/2026-07-23-antcliffe1970-hsc-r07-acquisition.md"
  push:
    branches:
      - main
    paths:
      - "data/hansen/antcliffe1970_hsc_r07_source_metadata.csv"
      - "data/hansen/antcliffe1970_hsc_r07_README.md"
      - "data/hansen/antcliffe1970_specimens.csv"
      - "data/hansen/antcliffe1970_gap_observations.csv"
      - "data/hansen/antcliffe1970_band_parameters.csv"
      - "data/hansen/antcliffe1970_hansen_ingestion_candidates.csv"
      - "data/hansen/hansen_1982_source_graph.csv"
      - "data/validation/antcliffe1970_hsc_r07_audit.json"
      - "tools/audit_antcliffe1970_hsc_r07.py"
      - "tests/test_antcliffe1970_hsc_r07_acquisition.py"
      - ".github/workflows/antcliffe1970-hsc-r07-acquisition.yml"
      - "research/programs/empirical_bandgap/state_updates/2026-07-23-antcliffe1970-hsc-r07-acquisition.md"

permissions:
  contents: read

jobs:
  primary-source-audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install focused test dependency
        run: python -m pip install --disable-pip-version-check pytest
      - name: Verify Antcliffe primary-source reconstruction
        run: python -m pytest -q tests/test_antcliffe1970_hsc_r07_acquisition.py
      - name: Regenerate immutable audit
        shell: bash
        run: |
          set -euo pipefail
          python tools/audit_antcliffe1970_hsc_r07.py > /tmp/antcliffe-audit.json
          cmp /tmp/antcliffe-audit.json data/validation/antcliffe1970_hsc_r07_audit.json
