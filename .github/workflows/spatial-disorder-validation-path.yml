name: spatial-disorder-validation-path

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install package
        run: python -m pip install -e '.[test]'
      - name: Verify validation-path qualification
        shell: bash
        run: |
          set -o pipefail
          mkdir -p validation-path-diagnostics
          python -m pytest -q \
            tests/test_spatial_disorder_validation_path.py \
            2>&1 | tee validation-path-diagnostics/pytest.txt
      - name: Build controlled reference
        run: |
          python -m tools.build_spatial_disorder_validation_path_reference \
            --output validation-path-diagnostics/spatial_disorder_validation_path_qualification.json
      - name: Validate generated qualification boundaries
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          record = json.loads(
              Path(
                  "validation-path-diagnostics/"
                  "spatial_disorder_validation_path_qualification.json"
              ).read_text(encoding="utf-8")
          )
          assert record["schema_version"] == "1.1"
          assert record["status"] == "external_data_blocked"
          assert record["direct_candidate_ids"] == []
          assert record["partial_multiresolution_candidate_ids"] == [
              "gopal_1992_two_beam_transmission"
          ]
          assert record["headline"]["direct_validation_candidate_count"] == 0
          assert record["headline"]["partial_multiresolution_candidate_count"] == 1
          assert record["headline"]["nearest_benchmark_scale_ratio"] == 12.0
          by_source = {
              item["source_id"]: item["qualification"]
              for item in record["qualifications"]
          }
          assert len(by_source) == 10
          assert by_source["gopal_1992_two_beam_transmission"] == (
              "partial_multiresolution_benchmark"
          )
          assert by_source["furstenberg_2005_pl_transmission_mapping"] == (
              "cross_modality_context"
          )
          assert by_source["chang_2005_infrared_mapping"] == (
              "source_bounded_figure_benchmark"
          )
          boundaries = " ".join(record["claim_boundaries"])
          assert "Two measured scales" in boundaries
          assert "Nominal beam diameters" in boundaries
          assert "Rendered spectra" in boundaries
          assert "manuscript" in boundaries
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spatial-disorder-validation-path
          path: |
            validation-path-diagnostics
            docs/protocols/r04_external_validation_path_qualification.md
            literature/notes/uploaded_hgcdte_mapping_source_audit.md
            research/programs/spatial_disorder/external_validation_state.md
          if-no-files-found: error
          retention-days: 30
