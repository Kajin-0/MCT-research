name: spatial-disorder-validation-path

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install package
        run: python -m pip install -e '.[test]'
      - name: Verify validation-path qualification
        shell: bash
        run: |
          set -o pipefail
          mkdir -p validation-path-diagnostics
          python -m pytest -q \
            tests/test_spatial_disorder_validation_path.py \
            tests/test_spatial_disorder_pixel_scale_source.py \
            tests/test_spatial_disorder_depth_observation_source.py \
            tests/test_spatial_disorder_spatial_method_source.py \
            2>&1 | tee validation-path-diagnostics/pytest.txt
      - name: Build controlled reference
        run: |
          python -m tools.build_spatial_disorder_spatial_method_source_reference \
            --output validation-path-diagnostics/spatial_disorder_validation_path_qualification.json
      - name: Compare generated and immutable decisions
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          generated = json.loads(
              Path(
                  "validation-path-diagnostics/"
                  "spatial_disorder_validation_path_qualification.json"
              ).read_text(encoding="utf-8")
          )
          immutable = json.loads(
              Path(
                  "data/validation/"
                  "spatial_disorder_uploaded_source_audit.json"
              ).read_text(encoding="utf-8")
          )

          assert generated["schema_version"] == "1.4"
          assert immutable["schema_version"] == "1.3"
          assert generated["status"] == immutable["status"]
          assert generated["direct_candidate_ids"] == (
              immutable["direct_validation_candidate_ids"]
          )
          assert generated["partial_multiresolution_candidate_ids"] == (
              immutable["partial_multiresolution_candidate_ids"]
          )

          generated_classes = {
              item["source_id"]: item["qualification"]
              for item in generated["qualifications"]
          }
          assert generated_classes == immutable["classifications"]
          assert len(generated_classes) == 13
          assert generated_classes["ariel_1995_derivative_depth_grading"] == (
              "depth_observation_model_context"
          )
          assert generated_classes[
              "ariel_1996_same_wafer_differential_absorption"
          ] == "spatial_observation_method_context"

          headline = generated["headline"]
          partial = immutable["nearest_partial_multiresolution_benchmark"]
          pixel = immutable["nearest_detector_pixel_scale_benchmark"]
          depth = immutable["nearest_depth_observation_model_context"]
          spatial = immutable["nearest_spatial_observation_method_context"]
          price = immutable["price_boyd_review_retrieval"]
          assert headline["direct_validation_candidate_count"] == 0
          assert headline["partial_multiresolution_candidate_count"] == 1
          assert headline["nearest_partial_multiresolution_benchmark"] == (
              partial["source_id"]
          )
          assert headline["nearest_partial_scale_diameters_micrometre"] == (
              partial["nominal_beam_diameters_micrometre"]
          )
          assert headline["nearest_partial_scale_ratio"] == (
              partial["nominal_diameter_ratio"]
          )
          assert headline["nearest_detector_pixel_scale_benchmark"] == (
              pixel["source_id"]
          )
          assert headline["pixel_scale_beam_diameter_micrometre"] == (
              pixel["beam_diameter_micrometre"]
          )
          assert headline["pixel_scale_scan_spacing_micrometre"] == (
              pixel["scan_spacing_micrometre"]
          )
          assert headline["pixel_scale_area_micrometre"] == pixel["area_micrometre"]
          assert headline["pixel_scale_reported_spectrum_count"] == (
              pixel["reported_spectrum_count"]
          )
          assert headline["nearest_depth_observation_model_context"] == (
              depth["source_id"]
          )
          assert headline["depth_observation_temperature_k"] == (
              depth["measurement_temperature_k"]
          )
          assert headline["bulk_sample_thickness_micrometre"] == (
              depth["bulk_sample_thickness_micrometre"]
          )
          assert headline["epitaxial_layer_thickness_range_micrometre"] == (
              depth["epitaxial_layer_thickness_range_micrometre"]
          )
          assert headline["nearest_spatial_observation_method_context"] == (
              spatial["source_id"]
          )
          assert headline["spatial_method_doi_status"] == spatial["doi_status"]
          assert headline["spatial_method_full_text_status"] == (
              spatial["full_text_status"]
          )
          assert headline["minimum_reliable_layer_thickness_micrometre"] == (
              spatial["minimum_reliable_layer_thickness_micrometre"]
          )
          assert headline["reported_thickness_accuracy_micrometre"] == (
              spatial["reported_thickness_accuracy_micrometre"]
          )
          assert headline["reported_band_gap_method_accuracy_mev"] == (
              spatial["reported_band_gap_method_accuracy_mev"]
          )
          assert headline["same_wafer_multiple_positions_reported"] == (
              spatial["same_wafer_multiple_positions_reported"]
          )
          assert headline["reported_effective_lateral_scale_count"] == (
              spatial["reported_effective_lateral_scale_count"]
          )
          assert headline["price_boyd_review_doi"] == price["doi"]
          assert headline["price_boyd_full_text_status"] == price["full_text_status"]
          assert headline["minimum_data_upgrade_for_ariel_1996"] == (
              immutable["minimum_ariel_1996_data_upgrade"]
          )

          generated_boundaries = " ".join(generated["claim_boundaries"])
          immutable_boundaries = " ".join(immutable["claim_boundaries"])
          for phrase in (
              "dense raster",
              "through-thickness Delta Eg",
              "spatial sampling intent",
              "one effective lateral scale",
              "not repeat uncertainty",
              "unresolved DOI",
              "manuscript",
          ):
              assert phrase in generated_boundaries
              assert phrase in immutable_boundaries
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spatial-disorder-validation-path
          path: |
            validation-path-diagnostics
            data/validation/spatial_disorder_uploaded_source_audit.json
            docs/protocols/r04_external_validation_path_qualification.md
            literature/notes/uploaded_hgcdte_mapping_source_audit.md
            literature/notes/phillips_2003_pixel_scale_absorption_audit.md
            literature/notes/ariel_1995_depth_grading_observation_audit.md
            literature/notes/ariel_1996_same_wafer_uniformity_abstract_audit.md
            literature/notes/hgcdte_spatial_mapping_doi_queue.md
            research/programs/spatial_disorder/external_validation_state.md
          if-no-files-found: error
          retention-days: 30
