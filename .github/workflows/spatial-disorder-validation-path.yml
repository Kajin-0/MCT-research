name: spatial-disorder-validation-path

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install package
        run: python -m pip install -e '.[test]'
      - name: Verify validation-path qualification
        shell: bash
        run: |
          set -o pipefail
          mkdir -p validation-path-diagnostics
          python -m pytest -q \
            tests/test_spatial_disorder_validation_path.py \
            2>&1 | tee validation-path-diagnostics/pytest.txt
      - name: Rebuild controlled reference
        run: |
          python -m tools.build_spatial_disorder_validation_path_reference \
            --output validation-path-diagnostics/spatial_disorder_validation_path_qualification.json
          cmp \
            data/validation/spatial_disorder_validation_path_qualification.json \
            validation-path-diagnostics/spatial_disorder_validation_path_qualification.json
      - name: Validate qualification boundaries
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          record = json.loads(
              Path(
                  "data/validation/"
                  "spatial_disorder_validation_path_qualification.json"
              ).read_text(encoding="utf-8")
          )
          assert record["status"] == "external_data_blocked"
          assert record["direct_candidate_ids"] == []
          assert record["headline"]["direct_validation_candidate_count"] == 0
          by_source = {
              item["source_id"]: item["qualification"]
              for item in record["qualifications"]
          }
          assert by_source == {
              "chang_2005_infrared_mapping": (
                  "source_bounded_figure_benchmark"
              ),
              "furstenberg_2005_pl_transmission_mapping": (
                  "cross_modality_context"
              ),
              "ruzhevich_2024_optical_microscopic_disorder": (
                  "not_qualifiable_from_available_record"
              ),
          }
          boundaries = " ".join(record["claim_boundaries"])
          assert "Multiple modalities" in boundaries
          assert "Rendered map figures" in boundaries
          assert "manuscript" in boundaries
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spatial-disorder-validation-path
          path: |
            validation-path-diagnostics
            docs/protocols/r04_external_validation_path_qualification.md
            data/validation/spatial_disorder_validation_path_qualification.json
          if-no-files-found: error
          retention-days: 30
