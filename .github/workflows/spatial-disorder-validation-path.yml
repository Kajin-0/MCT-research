name: spatial-disorder-validation-path

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install package
        run: python -m pip install -e '.[test]'
      - name: Verify validation-path qualification
        shell: bash
        run: |
          set -o pipefail
          mkdir -p validation-path-diagnostics
          python -m pytest -q \
            tests/test_spatial_disorder_validation_path.py \
            2>&1 | tee validation-path-diagnostics/pytest.txt
      - name: Build controlled reference
        run: |
          python -m tools.build_spatial_disorder_validation_path_reference \
            --output validation-path-diagnostics/spatial_disorder_validation_path_qualification.json
      - name: Compare generated and immutable decisions
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          generated = json.loads(
              Path(
                  "validation-path-diagnostics/"
                  "spatial_disorder_validation_path_qualification.json"
              ).read_text(encoding="utf-8")
          )
          immutable = json.loads(
              Path(
                  "data/validation/"
                  "spatial_disorder_uploaded_source_audit.json"
              ).read_text(encoding="utf-8")
          )

          assert generated["schema_version"] == "1.1"
          assert immutable["schema_version"] == "1.0"
          assert generated["status"] == immutable["status"]
          assert generated["direct_candidate_ids"] == (
              immutable["direct_validation_candidate_ids"]
          )
          assert generated["partial_multiresolution_candidate_ids"] == (
              immutable["partial_multiresolution_candidate_ids"]
          )

          generated_classes = {
              item["source_id"]: item["qualification"]
              for item in generated["qualifications"]
          }
          assert generated_classes == immutable["classifications"]
          assert len(generated_classes) == 10

          generated_headline = generated["headline"]
          immutable_nearest = immutable["nearest_available_benchmark"]
          assert generated_headline["direct_validation_candidate_count"] == 0
          assert generated_headline["partial_multiresolution_candidate_count"] == 1
          assert generated_headline["nearest_available_benchmark"] == (
              immutable_nearest["source_id"]
          )
          assert generated_headline[
              "nearest_benchmark_scale_diameters_micrometre"
          ] == immutable_nearest["nominal_beam_diameters_micrometre"]
          assert generated_headline["nearest_benchmark_scale_ratio"] == (
              immutable_nearest["nominal_diameter_ratio"]
          )
          assert generated_headline["minimum_data_upgrade_for_gopal_1992"] == (
              immutable["minimum_gopal_data_upgrade"]
          )

          generated_boundaries = " ".join(generated["claim_boundaries"])
          immutable_boundaries = " ".join(immutable["claim_boundaries"])
          assert "Two measured scales" in generated_boundaries
          assert "Two scales" in immutable_boundaries
          assert "Nominal beam diameters" in generated_boundaries
          assert "Nominal beam diameter" in immutable_boundaries
          assert "Rendered spectra" in generated_boundaries
          assert "Rendered spectra" in immutable_boundaries
          assert "manuscript" in generated_boundaries
          assert "manuscript" in immutable_boundaries
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spatial-disorder-validation-path
          path: |
            validation-path-diagnostics
            data/validation/spatial_disorder_uploaded_source_audit.json
            docs/protocols/r04_external_validation_path_qualification.md
            literature/notes/uploaded_hgcdte_mapping_source_audit.md
            research/programs/spatial_disorder/external_validation_state.md
          if-no-files-found: error
          retention-days: 30
