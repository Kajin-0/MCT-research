name: bootstrap-format-chang2006-figure2-margin

on:
  pull_request:
    paths:
      - '.github/workflows/bootstrap-format-chang2006-figure2-margin.yml'

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Correct continuation indentation
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('tools/audit_chang2006_figure2_readiness.py')
          text = path.read_text(encoding='utf-8')
          old = '''    declared_upper_margin = float(
              screen["source_domain_upper_margin_at_truth_eV"]
          )
          '''
          new = '''    declared_upper_margin = float(
                  screen["source_domain_upper_margin_at_truth_eV"]
              )
          '''
          if text.count(old) != 1:
              raise SystemExit('unexpected margin indentation anchor')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          python -m pip install -e . pytest
          pytest -q tests/test_chang2006_figure2_readiness.py

      - name: Freeze formatting correction
        run: |
          rm -f .github/workflows/bootstrap-format-chang2006-figure2-margin.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Format Chang Figure 2 domain-margin audit'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
