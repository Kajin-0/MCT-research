name: r02-epw-serial-patch-validation

on:
  pull_request:
    paths:
      - '.github/workflows/r02-epw-serial-patch-validation.yml'
      - 'first_principles/b0/r02_epw_serial_patch_validation_contract.json'
      - 'first_principles/b0/r02_epw_same_state_replay.in'
      - 'patches/qe76-epw61-serial-epwread-epmatwp-allocation.patch'
      - 'research/patch_proposals/qe76-epw61-serial-epwread-epmatwp-allocation.patch'
      - 'tools/run_epw_serial_patch_validation_ci.sh'
      - 'tools/design_epw_same_state_attribution.py'
      - 'tests/test_r02_epw_serial_patch_validation.py'
      - 'tests/test_r02_epw_serial_epmatwp_diagnosis.py'
      - 'tests/test_r02_epw_same_state_attribution_design.py'
  workflow_dispatch:

concurrency:
  group: r02-epw-serial-patch-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  one-build-one-preparation-one-replay:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      OMP_NUM_THREADS: '1'
      OPENBLAS_NUM_THREADS: '1'
      MKL_NUM_THREADS: '1'
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install compiler and numerical dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential gfortran git make perl python3-pip \
            libblas-dev liblapack-dev libfftw3-dev
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Execute one patched serial restart validation
        run: bash tools/run_epw_serial_patch_validation_ci.sh

      - name: Upload complete validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r02-epw-serial-patch-validation-evidence
          path: r02-serial-epwread-patch-validation-evidence
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
