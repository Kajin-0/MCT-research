name: one-off correlated holdout and protocol fix

on:
  push:
    branches:
      - agent/correlated-holdout-protocol-fix

permissions:
  contents: write

jobs:
  patch-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/correlated-holdout-protocol-fix
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply focused source and protocol patch
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path


          def replace_once(text: str, old: str, new: str, *, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{label}: expected exactly one match, found {count}")
              return text.replace(old, new, 1)


          source_path = Path("src/mct_research/composition_uncertainty.py")
          source = source_path.read_text(encoding="utf-8")

          old_dataclasses = '''@dataclass(frozen=True)
          class CompositionHoldoutFold:
              name: str
              held_out_indices: NDArray[np.int64]
              prediction_ev: FloatArray
              effective_sigma_ev: FloatArray
              composition_derivative_ev_per_x: FloatArray
              metrics: ResidualMetrics
              fit: CompositionAwareGapFit


          @dataclass(frozen=True)
          class CompositionCrossValidationResult:
              predictions_ev: FloatArray
              residual_ev: FloatArray
              effective_sigma_ev: FloatArray
              metrics: ResidualMetrics
              folds: tuple[CompositionHoldoutFold, ...]
          '''
          new_dataclasses = '''@dataclass(frozen=True)
          class CompositionHoldoutFold:
              name: str
              held_out_indices: NDArray[np.int64]
              prediction_ev: FloatArray
              effective_sigma_ev: FloatArray
              effective_covariance_ev2: FloatArray
              composition_derivative_ev_per_x: FloatArray
              marginal_metrics: ResidualMetrics
              full_covariance_chi_square: float
              full_covariance_chi_square_per_observation: float
              metrics_interpretation: str
              fit: CompositionAwareGapFit

              @property
              def metrics(self) -> ResidualMetrics:
                  """Backward-compatible alias for diagonal-marginal residual metrics."""

                  return self.marginal_metrics


          @dataclass(frozen=True)
          class CompositionCrossValidationResult:
              predictions_ev: FloatArray
              residual_ev: FloatArray
              effective_sigma_ev: FloatArray
              marginal_metrics: ResidualMetrics
              full_covariance_chi_square: float
              full_covariance_chi_square_per_observation: float
              metrics_interpretation: str
              folds: tuple[CompositionHoldoutFold, ...]

              @property
              def metrics(self) -> ResidualMetrics:
                  """Backward-compatible alias for diagonal-marginal residual metrics."""

                  return self.marginal_metrics
          '''
          source = replace_once(
              source,
              old_dataclasses,
              new_dataclasses,
              label="composition holdout dataclasses",
          )

          helper_anchor = '''def _holdout_splits_shared_group(
              data: CompositionAwareGapData,
              holdout: NDArray[np.bool_],
          ) -> bool:
          '''
          helper = '''def _full_covariance_chi_square(
              residual_ev: ArrayLike,
              covariance_ev2: ArrayLike,
          ) -> float:
              """Return r.T C^-1 r for one held-out covariance block."""

              residual = np.asarray(residual_ev, dtype=float).ravel()
              covariance = np.asarray(covariance_ev2, dtype=float)
              expected_shape = (residual.size, residual.size)
              if residual.size == 0 or not np.all(np.isfinite(residual)):
                  raise ValueError("held-out residual must be non-empty and finite")
              if covariance.shape != expected_shape:
                  raise ValueError("held-out covariance has the wrong shape")
              if not np.all(np.isfinite(covariance)) or not np.allclose(
                  covariance,
                  covariance.T,
                  rtol=1.0e-12,
                  atol=1.0e-15,
              ):
                  raise ValueError("held-out covariance must be finite and symmetric")
              try:
                  cholesky = np.linalg.cholesky(covariance)
              except np.linalg.LinAlgError as error:
                  raise np.linalg.LinAlgError(
                      "held-out covariance must be positive definite"
                  ) from error
              whitened = np.linalg.solve(cholesky, residual)
              return float(whitened @ whitened)


          def _holdout_splits_shared_group(
              data: CompositionAwareGapData,
              holdout: NDArray[np.bool_],
          ) -> bool:
          '''
          source = replace_once(
              source,
              helper_anchor,
              helper,
              label="full covariance chi-square helper",
          )

          source = replace_once(
              source,
              '''    assigned = np.zeros(data.gap_ev.shape, dtype=int)
              folds: list[CompositionHoldoutFold] = []
          ''',
              '''    assigned = np.zeros(data.gap_ev.shape, dtype=int)
              folds: list[CompositionHoldoutFold] = []
              full_covariance_chi_square = 0.0
              metrics_interpretation = (
                  "unweighted metrics plus diagonal-marginal weighted metrics; "
                  "within-specimen correlation is represented by the separate "
                  "full-covariance chi-square; coefficient uncertainty is excluded"
              )
          ''',
              label="cross-validation accumulator",
          )

          source = replace_once(
              source,
              '''        held_out_sigma = np.sqrt(np.diag(held_out_covariance))

              indices = np.flatnonzero(holdout)
          ''',
              '''        held_out_sigma = np.sqrt(np.diag(held_out_covariance))
              held_out_residual = held_out.gap_ev - prediction
              held_out_chi_square = _full_covariance_chi_square(
                  held_out_residual,
                  held_out_covariance,
              )
              full_covariance_chi_square += held_out_chi_square

              indices = np.flatnonzero(holdout)
          ''',
              label="held-out full covariance statistic",
          )

          old_fold = '''            CompositionHoldoutFold(
                          name=str(name),
                          held_out_indices=indices.astype(np.int64),
                          prediction_ev=prediction,
                          effective_sigma_ev=held_out_sigma,
                          composition_derivative_ev_per_x=derivative,
                          metrics=residual_metrics(
                              held_out.gap_ev,
                              prediction,
                              sigma_ev=held_out_sigma,
                          ),
                          fit=fit,
                      )
          '''
          new_fold = '''            CompositionHoldoutFold(
                          name=str(name),
                          held_out_indices=indices.astype(np.int64),
                          prediction_ev=prediction,
                          effective_sigma_ev=held_out_sigma,
                          effective_covariance_ev2=held_out_covariance,
                          composition_derivative_ev_per_x=derivative,
                          marginal_metrics=residual_metrics(
                              held_out.gap_ev,
                              prediction,
                              sigma_ev=held_out_sigma,
                          ),
                          full_covariance_chi_square=held_out_chi_square,
                          full_covariance_chi_square_per_observation=(
                              held_out_chi_square / held_out.gap_ev.size
                          ),
                          metrics_interpretation=metrics_interpretation,
                          fit=fit,
                      )
          '''
          source = replace_once(source, old_fold, new_fold, label="holdout fold output")

          old_result = '''    return CompositionCrossValidationResult(
                  predictions_ev=predictions,
                  residual_ev=residual,
                  effective_sigma_ev=effective_sigma,
                  metrics=residual_metrics(
                      data.gap_ev[evaluated],
                      predictions[evaluated],
                      sigma_ev=effective_sigma[evaluated],
                  ),
                  folds=tuple(folds),
              )
          '''
          new_result = '''    marginal_metrics = residual_metrics(
                  data.gap_ev[evaluated],
                  predictions[evaluated],
                  sigma_ev=effective_sigma[evaluated],
              )
              return CompositionCrossValidationResult(
                  predictions_ev=predictions,
                  residual_ev=residual,
                  effective_sigma_ev=effective_sigma,
                  marginal_metrics=marginal_metrics,
                  full_covariance_chi_square=full_covariance_chi_square,
                  full_covariance_chi_square_per_observation=(
                      full_covariance_chi_square / marginal_metrics.count
                  ),
                  metrics_interpretation=metrics_interpretation,
                  folds=tuple(folds),
              )
          '''
          source = replace_once(
              source,
              old_result,
              new_result,
              label="cross-validation result output",
          )
          source_path.write_text(source, encoding="utf-8")

          tests_path = Path("tests/test_composition_uncertainty.py")
          tests = tests_path.read_text(encoding="utf-8")
          tests = replace_once(
              tests,
              '''    fit_composition_aware_gap_model,
                  leave_one_source_out,
          ''',
              '''    fit_composition_aware_gap_model,
                  leave_one_composition_group_out,
                  leave_one_source_out,
          ''',
              label="composition test import",
          )
          tests += '''

          def test_shared_group_holdout_reports_full_covariance_chi_square() -> None:
              x = np.repeat([0.2, 0.5, 0.8], 3)
              temperature = np.tile([0.0, 100.0, 200.0], 3)
              groups = np.repeat(["a", "b", "c"], 3)
              gap = -0.30 + 1.70 * x + 5.0e-4 * temperature
              gap[groups == "c"] += 0.004
              data = CompositionAwareGapData.from_arrays(
                  x,
                  temperature,
                  gap,
                  sigma_ev=0.001,
                  sigma_x=0.003,
                  group=groups,
                  measurement_class=["signed_gap"] * gap.size,
              )

              result = leave_one_composition_group_out(
                  data,
                  OscillatorBasisSpec(static_degree=1, quasiharmonic_degree=0),
                  composition_uncertainty=CompositionUncertaintySpec(
                      mode="shared_group"
                  ),
              )
              fold = next(item for item in result.folds if item.name == "c")
              residual = data.gap_ev[fold.held_out_indices] - fold.prediction_ev
              manual_chi_square = float(
                  residual
                  @ np.linalg.solve(fold.effective_covariance_ev2, residual)
              )
              marginal_diagonal_chi_square = float(
                  np.sum((residual / fold.effective_sigma_ev) ** 2)
              )

              assert fold.full_covariance_chi_square == pytest.approx(
                  manual_chi_square
              )
              assert fold.full_covariance_chi_square < marginal_diagonal_chi_square
              assert fold.full_covariance_chi_square_per_observation == pytest.approx(
                  manual_chi_square / residual.size
              )
              assert result.full_covariance_chi_square == pytest.approx(
                  sum(item.full_covariance_chi_square for item in result.folds)
              )
              assert "diagonal-marginal" in result.metrics_interpretation
              assert result.metrics is result.marginal_metrics
          '''
          tests_path.write_text(tests, encoding="utf-8")

          doc_path = Path("docs/insights/composition_uncertainty_benchmark.md")
          doc = doc_path.read_text(encoding="utf-8")
          doc = replace_once(
              doc,
              '''In shared-group cross-validation, a holdout may not split one specimen across
              training and test sets. Doing so would leak the same latent composition error
              into both sides of the comparison.

              ## Interpretation limits
          ''',
              '''In shared-group cross-validation, a holdout may not split one specimen across
              training and test sets. Doing so would leak the same latent composition error
              into both sides of the comparison.

              ## Holdout scoring

              Each fold retains the complete held-out covariance and reports

              ```text
              chi2_holdout = r^T C_holdout^-1 r.
              ```

              Unweighted MAE and RMSE remain useful descriptive errors. The existing weighted
              fields use only the marginal standard deviations `sqrt(diag(C_holdout))` and are
              therefore labeled diagonal-marginal metrics. They do not replace the correlated
              chi-square and must not be used to count a densely sampled specimen as many
              independent composition measurements.

              The holdout covariance currently includes reported energy uncertainty and the
              first-order composition block. It does not include fitted-coefficient uncertainty,
              so the statistic is a conditional model-error diagnostic rather than a complete
              posterior predictive check.

              ## Interpretation limits
          ''',
              label="composition holdout documentation",
          )
          doc_path.write_text(doc, encoding="utf-8")

          run_spec_path = Path("first_principles/a0/cdte_a0_run_spec.json")
          run_spec = json.loads(run_spec_path.read_text(encoding="utf-8"))
          run_spec["convergence_ladders"]["ph_tr2"] = [1e-10, 1e-12, 1e-14]
          run_spec_path.write_text(
              json.dumps(run_spec, indent=2) + "\n",
              encoding="utf-8",
          )

          validator_path = Path("tools/check_cdte_a0_convergence_protocol.py")
          validator = validator_path.read_text(encoding="utf-8")
          validator = replace_once(
              validator,
              '''    add(
                      "threshold_ladders_tighten",
                      isinstance(ladders, dict)
                      and _strictly_decreasing(ladders.get("scf_conv_thr_ry"))
                      and _strictly_decreasing(ladders.get("ph_tr2")),
                      "SCF and phonon thresholds must tighten monotonically.",
                  )

                  required_sequence = [
          ''',
              '''    add(
                      "threshold_ladders_tighten",
                      isinstance(ladders, dict)
                      and _strictly_decreasing(ladders.get("scf_conv_thr_ry"))
                      and _strictly_decreasing(ladders.get("ph_tr2")),
                      "SCF and phonon thresholds must tighten monotonically.",
                  )

                  governed_ladders = (
                      "ecutwfc_ry",
                      "ecutrho_ratio",
                      "k_grid_n",
                      "nbnd",
                      "scf_conv_thr_ry",
                      "ph_tr2",
                  )
                  add(
                      "governed_ladders_support_two_refinements",
                      isinstance(ladders, dict)
                      and all(
                          isinstance(ladders.get(name), list)
                          and len(ladders[name]) >= 3
                          for name in governed_ladders
                      ),
                      (
                          "Every ladder governed by the generic selection rule must contain "
                          "an initial point plus at least two refinements."
                      ),
                  )

                  required_sequence = [
          ''',
              label="convergence ladder length validation",
          )
          validator_path.write_text(validator, encoding="utf-8")

          convergence_test_path = Path("tests/test_cdte_a0_convergence_protocol.py")
          convergence_tests = convergence_test_path.read_text(encoding="utf-8")
          convergence_tests += '''

          def test_every_governed_ladder_supports_two_successive_refinements() -> None:
              specification = copy.deepcopy(_load(RUN_SPEC_PATH))
              specification["convergence_ladders"]["ph_tr2"] = [1e-12, 1e-14]

              report = evaluate_convergence_protocol(
                  specification,
                  _load(SELECTION_PATH),
              )

              assert report["protocol_valid"] is False
              assert (
                  "governed_ladders_support_two_refinements"
                  in report["blocking_checks"]
              )
          '''
          convergence_test_path.write_text(convergence_tests, encoding="utf-8")

          convergence_doc_path = Path(
              "first_principles/a0/cdte_a0_convergence_protocol.md"
          )
          convergence_doc = convergence_doc_path.read_text(encoding="utf-8")
          convergence_doc = replace_once(
              convergence_doc,
              '''```text
              tr2_ph = 1e-12 -> 1e-14
              ```
          ''',
              '''```text
              tr2_ph = 1e-10 -> 1e-12 -> 1e-14
              ```

              The looser first point supplies the initial value required before two successive
              threshold refinements. It does not relax the final declared threshold.
          ''',
              label="phonon threshold documentation",
          )
          convergence_doc_path.write_text(convergence_doc, encoding="utf-8")
          PY

      - name: Install package and tests
        run: python -m pip install -e '.[test]'

      - name: Run full test suite
        run: python -m pytest -q

      - name: Commit focused patch and remove one-off workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/oneoff-correlated-holdout-protocol-fix.yml
          git add \
            src/mct_research/composition_uncertainty.py \
            tests/test_composition_uncertainty.py \
            docs/insights/composition_uncertainty_benchmark.md \
            first_principles/a0/cdte_a0_run_spec.json \
            tools/check_cdte_a0_convergence_protocol.py \
            tests/test_cdte_a0_convergence_protocol.py \
            first_principles/a0/cdte_a0_convergence_protocol.md
          git commit -m "Correct correlated holdout scoring and threshold ladder"
          git push origin HEAD:agent/correlated-holdout-protocol-fix
