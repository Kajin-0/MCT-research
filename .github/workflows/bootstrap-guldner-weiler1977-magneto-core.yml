name: bootstrap-guldner-weiler1977-magneto-core

on:
  pull_request:
    paths:
      - '.github/workflows/bootstrap-guldner-weiler1977-magneto-core.yml'
      - 'data/evidence/guldner_weiler_1977_magneto_core.json'
      - 'tools/audit_guldner_weiler_1977_magneto_core.py'
      - 'tests/test_guldner_weiler_1977_magneto_core.py'
      - 'research/decision_records/2026-07-20-guldner-weiler1977-magneto-core.md'

permissions:
  contents: write

jobs:
  freeze:
    runs-on: ubuntu-24.04
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Update controlling program ledger
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('research/active_progress.md')
          text = path.read_text(encoding='utf-8')
          anchor = (
              'Orlita and Teppe share the Mikhailov/Dvoretskii MBE and magneto-optical '
              'lineage. They are not independent cross-laboratory validation sets. The '
              'static-law reopening gate remains closed.\n\n'
          )
          insert = anchor + (
              '### Guldner-Weiler 1977 primary magneto-optical core\n\n'
              '- The recovered Guldner Part I/II papers contribute seven exact 4.2 K '
              'composition/interaction-gap anchors from primary text or captions: '
              '`x=0.025/-261 meV`, `0.050/-207`, `0.115/-90`, `0.150/-30`, '
              '`0.185/+35`, `0.250/+161`, and `0.280/+208`. The complete Figure 11 '
              'trend remains figure-only.\n'
              '- Guldner reports density and electron-microprobe composition methods and '
              'a zero-gap crossing `x0=0.165+/-0.005`, but no specimen-level `sigma_x` '
              'for the individual anchors. The interaction gaps remain Pidgeon-Brown/VCA '
              'model-conditioned observations.\n'
              '- Weiler reports approximately `3 meV` fitted-gap uncertainty for ten '
              'magnetoreflectance specimens at 24 and 91 K, while composition uncertainty '
              'is `0.005-0.015`. Its own `dEg/dx=1.88-0.001*T` relation propagates this '
              'to `8.945-27.840 meV`, so composition uncertainty dominates the nominal '
              'gap-fit precision.\n'
              '- Weiler also reports an interband/intraband discrepancy up to about '
              '`4 meV` near `60 kG`; Guldner parameters better describe the intraband '
              'result but fit Weiler interband data more poorly. This is retained as '
              'observable/model-class dependence, not as a universal correction.\n'
              '- Independent-laboratory qualitative comparison is authorized. Few-meV '
              'cross-laboratory ranking, default pooling, trend-point digitization, and '
              'universal material-law fitting remain blocked.\n\n'
          )
          if text.count(anchor) != 1:
              raise SystemExit('unexpected active-progress Guldner-Weiler anchor')
          path.write_text(text.replace(anchor, insert, 1), encoding='utf-8')
          PY

      - name: Run focused magneto-optical audit
        run: |
          set -o pipefail
          python -m pip install -e . pytest
          pytest -vv tests/test_guldner_weiler_1977_magneto_core.py \
            2>&1 | tee /tmp/guldner-weiler1977-pytest.txt
          python tools/audit_guldner_weiler_1977_magneto_core.py \
            --input-json data/evidence/guldner_weiler_1977_magneto_core.json \
            --output-json /tmp/guldner-weiler1977-audit.json

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guldner-weiler1977-magneto-core
          path: |
            /tmp/guldner-weiler1977-pytest.txt
            /tmp/guldner-weiler1977-audit.json
          if-no-files-found: warn
          retention-days: 7

      - name: Freeze magneto-optical record
        run: |
          rm -f .github/workflows/bootstrap-guldner-weiler1977-magneto-core.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Freeze Guldner-Weiler magneto-optical evidence'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
