name: polar-vertex-decomposition-oracle

on:
  pull_request:
    paths:
      - '.github/workflows/polar-vertex-decomposition-oracle.yml'
      - 'first_principles/matrix_oracle/polar_vertex_decomposition_contract.json'
      - 'tools/run_polar_vertex_decomposition_oracle.py'
      - 'tests/test_polar_vertex_decomposition_oracle.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  oracle:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install package
        run: python -m pip install -e ".[test]"

      - name: Execute polar vertex decomposition oracle
        run: |
          mkdir -p polar-vertex-decomposition-evidence
          python tools/run_polar_vertex_decomposition_oracle.py \
            --contract first_principles/matrix_oracle/polar_vertex_decomposition_contract.json \
            --output-json polar-vertex-decomposition-evidence/result.json \
            > polar-vertex-decomposition-evidence/stdout.txt
          python -m pytest -q tests/test_polar_vertex_decomposition_oracle.py \
            > polar-vertex-decomposition-evidence/pytest.txt

      - name: Record environment and hashes
        if: always()
        run: |
          python --version > polar-vertex-decomposition-evidence/python-version.txt
          find polar-vertex-decomposition-evidence -type f ! -name sha256.txt -print0 \
            | sort -z | xargs -0 sha256sum \
            > polar-vertex-decomposition-evidence/sha256.txt

      - name: Upload oracle evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: polar-vertex-decomposition-evidence
          path: polar-vertex-decomposition-evidence
          if-no-files-found: error
          retention-days: 30
