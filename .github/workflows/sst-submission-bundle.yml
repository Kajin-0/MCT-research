name: sst-submission-bundle

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install system document tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-fonts-recommended \
            librsvg2-bin \
            poppler-utils \
            ghostscript
      - name: Install Python package
        run: python -m pip install -e '.[test]'
      - name: Build named and anonymous submission bundles
        run: |
          python -m tools.build_sst_submission_bundle \
            --repository-root . \
            --output-dir sst-submission-generated \
            --compile \
            --commit-sha "$GITHUB_SHA"
      - name: Run source and compiled bundle tests
        env:
          SST_BUNDLE_DIR: ${{ github.workspace }}/sst-submission-generated
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q \
            tests/test_sst_submission_bundle.py \
            tests/test_sst_compiled_bundle.py \
            tests/test_flagship_journal_submission_gate.py \
            tests/test_flagship_novelty_boundary.py \
            tests/test_distributional_band_edge_manuscript_assets.py \
            2>&1 | tee sst-submission-generated/pytest.txt
      - name: Render review PDFs for visual inspection
        run: |
          mkdir -p sst-submission-generated/renders/named
          mkdir -p sst-submission-generated/renders/anonymous
          pdftoppm -png -r 120 \
            sst-submission-generated/manuscript_named.pdf \
            sst-submission-generated/renders/named/page
          pdftoppm -png -r 120 \
            sst-submission-generated/manuscript_anonymous.pdf \
            sst-submission-generated/renders/anonymous/page
          pdfinfo sst-submission-generated/manuscript_named.pdf \
            > sst-submission-generated/manuscript_named_pdfinfo.txt
          pdfinfo sst-submission-generated/manuscript_anonymous.pdf \
            > sst-submission-generated/manuscript_anonymous_pdfinfo.txt
          pdftotext sst-submission-generated/manuscript_named.pdf \
            sst-submission-generated/manuscript_named_extracted.txt
          pdftotext sst-submission-generated/manuscript_anonymous.pdf \
            sst-submission-generated/manuscript_anonymous_extracted.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sst-submission-bundle
          path: sst-submission-generated
          if-no-files-found: error
          retention-days: 30
