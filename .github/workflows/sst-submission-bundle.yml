name: sst-submission-bundle

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install system document tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-fonts-recommended \
            librsvg2-bin \
            poppler-utils \
            ghostscript
      - name: Install Python package
        run: python -m pip install -e '.[test]'
      - name: Build named and anonymous submission bundles
        shell: bash
        env:
          SOURCE_COMMIT_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          set -o pipefail
          mkdir -p sst-submission-diagnostics
          python -m tools.build_sst_submission_bundle_compat \
            --repository-root . \
            --output-dir sst-submission-generated \
            --compile \
            --commit-sha "$SOURCE_COMMIT_SHA" \
            2>&1 | tee sst-submission-diagnostics/build.log
      - name: Publish review manuscripts into the repository
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          target="manuscript/distributional_band_edge/journal_submission/repository_bundle"

          # Publish once for this submission bundle. Later scientific revisions
          # must deliberately refresh the committed review files.
          if [[ -f "$target/manuscript_named.pdf" ]]; then
            echo "Repository-visible manuscript bundle already exists."
            exit 0
          fi

          mkdir -p "$target/figures"
          cp sst-submission-generated/manuscript_named.tex "$target/"
          cp sst-submission-generated/manuscript_named.pdf "$target/"
          cp sst-submission-generated/manuscript_anonymous.tex "$target/"
          cp sst-submission-generated/manuscript_anonymous.pdf "$target/"
          cp sst-submission-generated/references.tex "$target/"
          cp sst-submission-generated/references.bib "$target/"
          cp sst-submission-generated/cover_letter_named.txt "$target/"
          cp sst-submission-generated/unresolved_metadata.json "$target/"
          cp sst-submission-generated/figures/*.pdf "$target/figures/"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$target"
          git commit -m "Publish repository-visible SST review manuscripts"
          git push origin "HEAD:$HEAD_BRANCH"
      - name: Run source and compiled bundle tests
        env:
          SST_BUNDLE_DIR: ${{ github.workspace }}/sst-submission-generated
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q \
            tests/test_sst_submission_bundle.py \
            tests/test_sst_submission_compat.py \
            tests/test_sst_compiled_bundle.py \
            tests/test_flagship_journal_submission_gate.py \
            tests/test_flagship_novelty_boundary.py \
            tests/test_distributional_band_edge_manuscript_assets.py \
            2>&1 | tee sst-submission-diagnostics/pytest.log
      - name: Render review PDFs for visual inspection
        run: |
          mkdir -p sst-submission-generated/renders/named
          mkdir -p sst-submission-generated/renders/anonymous
          pdftoppm -png -r 120 \
            sst-submission-generated/manuscript_named.pdf \
            sst-submission-generated/renders/named/page
          pdftoppm -png -r 120 \
            sst-submission-generated/manuscript_anonymous.pdf \
            sst-submission-generated/renders/anonymous/page
          pdfinfo sst-submission-generated/manuscript_named.pdf \
            > sst-submission-generated/manuscript_named_pdfinfo.txt
          pdfinfo sst-submission-generated/manuscript_anonymous.pdf \
            > sst-submission-generated/manuscript_anonymous_pdfinfo.txt
          pdftotext sst-submission-generated/manuscript_named.pdf \
            sst-submission-generated/manuscript_named_extracted.txt
          pdftotext sst-submission-generated/manuscript_anonymous.pdf \
            sst-submission-generated/manuscript_anonymous_extracted.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sst-submission-bundle
          path: |
            sst-submission-generated
            sst-submission-diagnostics
          if-no-files-found: warn
          retention-days: 30
