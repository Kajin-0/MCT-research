name: Aliev 1970 HSC_R12 primary-source audit

on:
  pull_request:
    paths:
      - "data/hansen/aliev1970_hsc_r12_source_metadata.csv"
      - "data/hansen/aliev1970_composition_groups.csv"
      - "data/hansen/aliev1970_table1_effective_mass.csv"
      - "data/hansen/aliev1970_relations.csv"
      - "data/hansen/aliev1970_model_assumptions.csv"
      - "data/hansen/aliev1970_hansen_ingestion_candidates.csv"
      - "data/hansen/aliev1970_hsc_r12_README.md"
      - "data/hansen/hansen_1982_source_graph.csv"
      - "data/validation/aliev1970_hsc_r12_audit.json"
      - "tools/audit_aliev1970_hsc_r12.py"
      - "tests/test_aliev1970_hsc_r12_primary_audit.py"
      - ".github/workflows/aliev1970-hsc-r12-primary-audit.yml"
      - "research/programs/empirical_bandgap/state_updates/2026-07-24-aliev1970-hsc-r12-primary-audit.md"
  push:
    branches: [main]
    paths:
      - "data/hansen/aliev1970_hsc_r12_source_metadata.csv"
      - "data/hansen/aliev1970_composition_groups.csv"
      - "data/hansen/aliev1970_table1_effective_mass.csv"
      - "data/hansen/aliev1970_relations.csv"
      - "data/hansen/aliev1970_model_assumptions.csv"
      - "data/hansen/aliev1970_hansen_ingestion_candidates.csv"
      - "data/hansen/aliev1970_hsc_r12_README.md"
      - "data/hansen/hansen_1982_source_graph.csv"
      - "data/validation/aliev1970_hsc_r12_audit.json"
      - "tools/audit_aliev1970_hsc_r12.py"
      - "tests/test_aliev1970_hsc_r12_primary_audit.py"
      - ".github/workflows/aliev1970-hsc-r12-primary-audit.yml"
      - "research/programs/empirical_bandgap/state_updates/2026-07-24-aliev1970-hsc-r12-primary-audit.md"

permissions:
  contents: read

jobs:
  primary-source-audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install focused test dependency
        run: python -m pip install --disable-pip-version-check pytest
      - name: Verify Aliev primary-source reconstruction
        run: python -m pytest -q tests/test_aliev1970_hsc_r12_primary_audit.py
      - name: Regenerate immutable audit
        shell: bash
        run: |
          set -euo pipefail
          python tools/audit_aliev1970_hsc_r12.py > /tmp/aliev-audit.json
          cmp /tmp/aliev-audit.json data/validation/aliev1970_hsc_r12_audit.json
