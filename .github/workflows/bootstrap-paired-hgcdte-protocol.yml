name: bootstrap-paired-hgcdte-protocol

on:
  pull_request:
    paths:
      - '.github/paired_protocol_bundle.part*'
      - '.github/workflows/bootstrap-paired-hgcdte-protocol.yml'

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-24.04
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Verify and decode audited protocol package
        run: |
          python - <<'PY'
          import base64
          import hashlib
          import io
          from pathlib import Path
          import tarfile

          parts = sorted(Path('.github').glob('paired_protocol_bundle.part*'))
          if [part.name for part in parts] != [
              f'paired_protocol_bundle.part{index:02d}' for index in range(9)
          ]:
              raise SystemExit(f'unexpected chunk inventory: {[part.name for part in parts]}')
          encoded = b''.join(part.read_bytes() for part in parts)
          if len(encoded) != 25392:
              raise SystemExit(f'encoded length changed: {len(encoded)}')
          encoded_digest = hashlib.sha256(encoded).hexdigest()
          if encoded_digest != 'a6ddc3fc75d510bfc2607bd04a9adbf890d4d1cc0978897583c314c09b661eeb':
              raise SystemExit(f'encoded digest mismatch: {encoded_digest}')
          archive = base64.b64decode(encoded, validate=True)
          archive_digest = hashlib.sha256(archive).hexdigest()
          if len(archive) != 19043 or archive_digest != '4db730c660c8d91c4e9c750317e3f1cb0360998478b67bead41fb452a3dd03e7':
              raise SystemExit(
                  f'archive identity mismatch: length={len(archive)} sha256={archive_digest}'
              )
          with tarfile.open(fileobj=io.BytesIO(archive), mode='r:gz') as stream:
              root = Path('.').resolve()
              for member in stream.getmembers():
                  target = (root / member.name).resolve()
                  if root not in target.parents and target != root:
                      raise SystemExit(f'unsafe archive member: {member.name}')
              stream.extractall('.')
          for part in parts:
              part.unlink()
          Path('.github/workflows/bootstrap-paired-hgcdte-protocol.yml').unlink()
          PY

      - name: Validate generated package
        run: |
          python -m pip install -e . pytest
          python tools/audit_hgcdte_paired_gap_acquisition.py \
            --input-json data/templates/hgcdte_paired_gap_acquisition_template.json \
            --mode planning \
            --output-json /tmp/regenerated_reference.json \
            > /tmp/paired_protocol_audit.txt
          cmp data/derived/hgcdte_paired_gap_protocol_reference_audit.json /tmp/regenerated_reference.json
          pytest -q tests/test_hgcdte_paired_gap_protocol.py

      - name: Commit generated protocol files
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Freeze paired HgCdTe acquisition protocol'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
