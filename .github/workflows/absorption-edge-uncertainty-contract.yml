name: absorption-edge-uncertainty-contract

on:
  pull_request:
    paths:
      - '.github/workflows/absorption-edge-uncertainty-contract.yml'
      - 'src/mct_research/absorption_edge_uncertainty.py'
      - 'tools/export_absorption_edge_uncertainty.py'
      - 'data/templates/absorption_edge_uncertainty_input.schema.json'
      - 'tests/test_absorption_edge_uncertainty_contract.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract-audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install package
        run: python -m pip install -e ".[test]"

      - name: Run focused contract tests
        run: |
          mkdir -p absorption-edge-uncertainty-evidence
          python -m pytest -q tests/test_absorption_edge_uncertainty_contract.py \
            > absorption-edge-uncertainty-evidence/pytest.txt \
            2> absorption-edge-uncertainty-evidence/pytest-stderr.txt

      - name: Export deterministic example
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import numpy as np

          edge = 0.1
          energy = np.linspace(0.1001, 0.25, 1001)
          absorption = 5000.0 * (energy - edge) ** 0.7 / energy
          payload = {
              "schema_version": "1.0",
              "specimen_id": "synthetic-specimen-001",
              "measurement_id": "synthetic-ftir-001",
              "source": {
                  "kind": "synthetic_validation",
                  "reference": "workflow-generated",
                  "calibration_record": "native-digital-synthetic-grid",
              },
              "metadata": {
                  "modality": "FTIR_absorption_coefficient",
                  "temperature_k": 80.0,
                  "thickness_um": 8.0,
                  "composition_x": 0.21,
                  "composition_sigma_x": 0.001,
                  "composition_method": "synthetic_declared",
                  "carrier_type": "n",
                  "carrier_density_cm3": 2.0e15,
                  "carrier_density_status": "synthetic_known",
                  "tail_model": "none_in_generating_fractional_power_curve",
              },
              "analysis_assumptions": {
                  "fit_absorption_window_cm1": [600.0, 5000.0],
                  "edge_search_bounds_ev": [0.09, 0.101],
                  "thresholds_cm1": [600.0, 1000.0, 1500.0, 2000.0],
                  "fractional_power_exponents": ["free", 0.5, 1.0],
              },
              "spectrum": {
                  "energy_ev": energy.tolist(),
                  "absorption_cm1": absorption.tolist(),
              },
          }
          Path("absorption-edge-uncertainty-evidence/input.json").write_text(
              json.dumps(payload, indent=2) + "\n", encoding="utf-8"
          )
          PY
          python -m tools.export_absorption_edge_uncertainty \
            --input-json absorption-edge-uncertainty-evidence/input.json \
            --output-json absorption-edge-uncertainty-evidence/result.json \
            > absorption-edge-uncertainty-evidence/stdout.txt \
            2> absorption-edge-uncertainty-evidence/stderr.txt

      - name: Record environment and hashes
        if: always()
        run: |
          python --version > absorption-edge-uncertainty-evidence/python-version.txt
          find absorption-edge-uncertainty-evidence -type f ! -name sha256.txt -print0 \
            | sort -z | xargs -0 sha256sum \
            > absorption-edge-uncertainty-evidence/sha256.txt

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: absorption-edge-uncertainty-evidence
          path: absorption-edge-uncertainty-evidence
          if-no-files-found: error
          retention-days: 30
