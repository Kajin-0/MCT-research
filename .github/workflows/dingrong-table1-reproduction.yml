name: dingrong-table1-reproduction

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reproduce:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install
        run: python -m pip install -e '.[test]'
      - name: Focused tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p dingrong-reproduction
          python -m pytest -q \
            tests/test_dingrong1985.py \
            tests/test_dingrong1985_record.py \
            2>&1 | tee dingrong-reproduction/pytest.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dingrong-table1-reproduction
          path: |
            dingrong-reproduction
            data/validation/dingrong1985_table1_reproduction.json
            literature/acquisition/2026-07-21-obtained-source-disposition.json
            docs/derivations/015_dingrong1985_table1_reproduction.md
          if-no-files-found: error
          retention-days: 30
