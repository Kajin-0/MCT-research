name: hermitian-covariance-64d

on:
  pull_request:
    paths:
      - '.github/workflows/hermitian-covariance-64d.yml'
      - 'src/mct_research/matrix_coordinates.py'
      - 'src/mct_research/projection.py'
      - 'src/mct_research/pipeline.py'
      - 'src/mct_research/dataio.py'
      - 'src/mct_research/code_exports.py'
      - 'src/mct_research/__init__.py'
      - 'tests/test_hermitian_covariance_coordinates.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  covariance-audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install package
        run: python -m pip install -e ".[test]"

      - name: Run focused covariance tests
        run: |
          mkdir -p hermitian-covariance-evidence
          python -m pytest -q tests/test_hermitian_covariance_coordinates.py \
            > hermitian-covariance-evidence/pytest.txt \
            2> hermitian-covariance-evidence/pytest-stderr.txt

      - name: Record environment and hashes
        if: always()
        run: |
          python --version > hermitian-covariance-evidence/python-version.txt
          find hermitian-covariance-evidence -type f ! -name sha256.txt -print0 \
            | sort -z | xargs -0 sha256sum \
            > hermitian-covariance-evidence/sha256.txt

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hermitian-covariance-evidence
          path: hermitian-covariance-evidence
          if-no-files-found: error
          retention-days: 30
