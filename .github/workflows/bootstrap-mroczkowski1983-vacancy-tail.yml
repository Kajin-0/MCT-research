name: bootstrap-mroczkowski1983-vacancy-tail

on:
  pull_request:
    paths:
      - '.github/workflows/bootstrap-mroczkowski1983-vacancy-tail.yml'
      - 'data/evidence/mroczkowski_1983_vacancy_tail_constraint.json'
      - 'tools/audit_mroczkowski_1983_vacancy_tail.py'
      - 'tests/test_mroczkowski_1983_vacancy_tail.py'
      - 'research/decision_records/2026-07-20-mroczkowski1983-vacancy-tail.md'

permissions:
  contents: write

jobs:
  freeze:
    runs-on: ubuntu-24.04
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Update controlling program ledger
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('research/active_progress.md')
          text = path.read_text(encoding='utf-8')
          anchor = (
              '- Across representative Hg-rich points, the `alpha=20` to `1000 cm^-1` '
              'edge span is `15.0-37.6 meV`. For a 500 um specimen, the transmission '
              'zero-intercept edge is about `20-21 meV` below the alpha-500 edge at '
              '300 K. Eq. (13) uses cut-on wavenumber `Zi`, not absorption `e/d`; those '
              'coordinates are not interchangeable.\n'
          )
          addition = (
              '- Mroczkowski et al. 1983 provides publisher-abstract evidence at fixed '
              'nominal `x=0.3` that Hg-vacancy acceptor state changes the p-type '
              'exponential absorption-tail slope: `k=148 eV^-1` in high-purity material '
              'and `105 eV^-1` near `2e16 cm^-3` acceptors. The corresponding e-fold '
              'energy increases from `6.757` to `9.524 meV`, or `40.95%`.\n'
              '- This source strengthens the paired protocol requirement for an achieved '
              'vacancy-state covariate. Full operator implementation, same-specimen '
              'causality, uncertainty-weighted fitting, latent-gap correction, and a '
              'universal vacancy coefficient remain blocked until the primary full text '
              'and complete specimen metadata are recovered.\n'
          )
          if text.count(anchor) != 1:
              raise SystemExit('unexpected active-progress vacancy-tail anchor')
          path.write_text(text.replace(anchor, anchor + addition, 1), encoding='utf-8')
          PY

      - name: Run focused vacancy-tail audit
        run: |
          set -o pipefail
          python -m pip install -e . pytest
          pytest -vv tests/test_mroczkowski_1983_vacancy_tail.py \
            2>&1 | tee /tmp/mroczkowski1983-pytest.txt
          python tools/audit_mroczkowski_1983_vacancy_tail.py \
            --input-json data/evidence/mroczkowski_1983_vacancy_tail_constraint.json \
            --output-json /tmp/mroczkowski1983-audit.json

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mroczkowski1983-vacancy-tail
          path: |
            /tmp/mroczkowski1983-pytest.txt
            /tmp/mroczkowski1983-audit.json
          if-no-files-found: warn
          retention-days: 7

      - name: Freeze vacancy-tail record
        run: |
          rm -f .github/workflows/bootstrap-mroczkowski1983-vacancy-tail.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Freeze Mroczkowski 1983 vacancy-tail constraint'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
