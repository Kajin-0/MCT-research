name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and tests
        run: python -m pip install --upgrade pip && python -m pip install -e ".[test]"
      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q --tb=short 2>&1 | tee pytest-${{ matrix.python-version }}.log
      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.python-version }}
          path: pytest-${{ matrix.python-version }}.log
          retention-days: 7
