name: r01-temperature-benchmark-eligibility

on:
  pull_request:
    paths:
      - '.github/workflows/r01-temperature-benchmark-eligibility.yml'
      - 'data/evidence/hgcdte_chu_1991_turning_point_series.json'
      - 'data/experimental/schmit1969_specimens.csv'
      - 'data/experimental/schmit1969_table3_cutoff_observations.csv'
      - 'data/experimental/scott1969_figure2_digitized.csv'
      - 'data/experimental/scott1969_figure2_extraction_README.md'
      - 'data/experimental/seiler1990_figure7_digitized.csv'
      - 'data/experimental/seiler1990_specimens.csv'
      - 'data/validation/r01_temperature_benchmark_eligibility.json'
      - 'research/decision_records/2026-07-23-r01-temperature-benchmark-eligibility.md'
      - 'research/programs/empirical_bandgap/state_updates/2026-07-23-temperature-benchmark-eligibility.md'
      - 'src/mct_research/r01_temperature_benchmark_eligibility.py'
      - 'tests/test_r01_temperature_benchmark_eligibility.py'
      - 'tests/test_r01_temperature_benchmark_eligibility_reference.py'
      - 'tools/build_r01_temperature_benchmark_eligibility.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install package
        run: python -m pip install -e '.[test]'
      - name: Run focused source-eligibility tests
        run: |
          python -m pytest -vv \
            tests/test_r01_temperature_benchmark_eligibility.py
      - name: Build deterministic candidate twice
        run: |
          python tools/build_r01_temperature_benchmark_eligibility.py \
            --output /tmp/r01-temperature-benchmark-eligibility-a.json
          python tools/build_r01_temperature_benchmark_eligibility.py \
            --output /tmp/r01-temperature-benchmark-eligibility-b.json
          cmp /tmp/r01-temperature-benchmark-eligibility-a.json \
              /tmp/r01-temperature-benchmark-eligibility-b.json
      - name: Assert decision and claim boundary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          result = json.loads(
              Path('/tmp/r01-temperature-benchmark-eligibility-a.json').read_text()
          )
          assert result['program'] == 'R01'
          assert result['issue'] == 320
          assert result['summary']['source_count'] == 4
          assert result['summary']['row_count'] == 167
          assert result['summary']['exact_measurement_class_count'] == 4
          assert result['summary']['maximum_sources_in_one_exact_class'] == 1
          assert result['decision'] == (
              'class_specific_single_source_benchmarks_only'
          )
          assert result['gates'][
              'E2_any_exact_class_source_holdout_authorized'
          ] is False
          assert result['gates'][
              'E4_universal_model_advancement_authorized'
          ] is False
          boundary = result['observation_boundary']
          assert boundary['cross_class_pooling_authorized'] is False
          assert boundary['model_coefficients_fitted'] == 0
          PY
      - name: Validate committed reference when present
        run: |
          if [ -f data/validation/r01_temperature_benchmark_eligibility.json ]; then
            cmp /tmp/r01-temperature-benchmark-eligibility-a.json \
                data/validation/r01_temperature_benchmark_eligibility.json
            python -m pytest -vv \
              tests/test_r01_temperature_benchmark_eligibility_reference.py
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: r01-temperature-benchmark-eligibility-candidate
          path: |
            /tmp/r01-temperature-benchmark-eligibility-a.json
          if-no-files-found: error
          retention-days: 30
