<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="760" viewBox="0 0 1240 760"><title>HgCdTe gap observation identifiability</title><rect width="100%" height="100%" fill="white"/><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#444"/></marker></defs><style>text{font-family:Arial,sans-serif;fill:#111}.title{font-size:21px;font-weight:700}.panel{font-size:17px;font-weight:700}.label{font-size:15px}.small{font-size:12px}.equation{font-size:16px;font-family:Arial,sans-serif}.box{fill:white;stroke:#222;stroke-width:1.6}.latent{fill:#f2f2f2;stroke:#111;stroke-width:2}.term{fill:#fafafa;stroke:#666;stroke-width:1.4}.result{fill:#ededed;stroke:#111;stroke-width:2}.arrow{stroke:#444;stroke-width:1.6}.dashed{stroke:#777;stroke-width:1.4;stroke-dasharray:6 5}.derived{fill:none;stroke:#444;stroke-width:1.5;stroke-dasharray:5 4}</style><text x="35.0" y="36.0" text-anchor="start" class="title">Figure 4. What an absorption-derived HgCdTe edge actually measures</text><rect x="45" y="110" width="190" height="92" rx="8" class="box"/><text x="140.0" y="137.0" text-anchor="middle" class="panel">Specimen state</text><text x="140.0" y="164.0" text-anchor="middle" class="label">composition  x ± σx</text><text x="140.0" y="188.0" text-anchor="middle" class="label">temperature  T ± σT</text><rect x="315" y="112" width="245" height="88" rx="8" class="latent"/><text x="437.5" y="142.0" text-anchor="middle" class="panel">Latent material gap</text><text x="437.5" y="178.0" text-anchor="middle" class="equation">Eg = Eg(x,T)</text><line x1="235" y1="156" x2="315" y2="156" class="arrow" marker-end="url(#arrowhead)"/><rect x="655" y="82" width="270" height="105" rx="8" class="box"/><text x="790.0" y="112.0" text-anchor="middle" class="panel">Magneto-optical observation</text><text x="790.0" y="151.0" text-anchor="middle" class="equation">yMO = Eg(x,T) + εMO</text><rect x="655" y="238" width="520" height="130" rx="8" class="box"/><text x="915.0" y="268.0" text-anchor="middle" class="panel">Intrinsic-absorption observation</text><text x="915.0" y="309.0" text-anchor="middle" class="equation">yabs = Eg + Δmethod + Δcarrier + Δvacancy + εabs</text><line x1="560" y1="145" x2="655" y2="134" class="arrow" marker-end="url(#arrowhead)"/><line x1="560" y1="168" x2="655" y2="287" class="arrow" marker-end="url(#arrowhead)"/><line x1="612" y1="134" x2="612" y2="287" class="dashed"/><text x="600.0" y="216.0" text-anchor="end" class="small">same specimen</text><rect x="70" y="430" width="235" height="112" rx="8" class="term"/><text x="187.5" y="459.0" text-anchor="middle" class="panel">Δmethod</text><text x="187.5" y="490.0" text-anchor="middle" class="small">fit family • window • threshold</text><text x="187.5" y="516.0" text-anchor="middle" class="small">tail treatment • calibration</text><line x1="187.5" y1="430" x2="820" y2="368" class="arrow" marker-end="url(#arrowhead)"/><rect x="340" y="430" width="235" height="112" rx="8" class="term"/><text x="457.5" y="459.0" text-anchor="middle" class="panel">Δcarrier</text><text x="457.5" y="490.0" text-anchor="middle" class="small">Hall type • n or p • mobility</text><text x="457.5" y="516.0" text-anchor="middle" class="small">Burstein-Moss / filling state</text><line x1="457.5" y1="430" x2="820" y2="368" class="arrow" marker-end="url(#arrowhead)"/><rect x="610" y="430" width="235" height="112" rx="8" class="term"/><text x="727.5" y="459.0" text-anchor="middle" class="panel">Δvacancy</text><text x="727.5" y="490.0" text-anchor="middle" class="small">vacancy-sensitive proxy</text><text x="727.5" y="516.0" text-anchor="middle" class="small">anneal and processing history</text><line x1="727.5" y1="430" x2="1005" y2="368" class="arrow" marker-end="url(#arrowhead)"/><rect x="900" y="430" width="295" height="112" rx="8" class="result"/><text x="1047.5" y="458.0" text-anchor="middle" class="panel">Paired same-specimen difference</text><text x="1047.5" y="490.0" text-anchor="middle" class="equation">yabs − yMO</text><text x="1047.5" y="518.0" text-anchor="middle" class="small">= Δmethod + Δcarrier + Δvacancy + noise</text><polyline points="925,134 1212,134 1212,405 1125,430" class="derived" marker-end="url(#arrowhead)"/><polyline points="1100,368 1100,405 1080,430" class="derived" marker-end="url(#arrowhead)"/><text x="1202.0" y="283.0" text-anchor="end" class="small">derived comparison</text><line x1="45" y1="600" x2="1195" y2="600" stroke="#bbb"/><text x="620.0" y="640.0" text-anchor="middle" class="label">Without paired modalities, independent composition metrology, Hall state, and a vacancy proxy,</text><text x="620.0" y="670.0" text-anchor="middle" class="label">the latent gap and observation terms are aliased. A precise fit is not the same as identification.</text><text x="620.0" y="716.0" text-anchor="middle" class="small">The diagram defines an observation model; it does not authorize a universal correction.</text></svg>
