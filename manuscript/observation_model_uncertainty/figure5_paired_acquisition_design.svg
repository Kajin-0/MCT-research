681.0" text-anchor="middle" class="small">Each specimen requires independent composition metrology, Hall state, vacancy proxy, raw absorption, and paired magneto-optical gap.</text><text x="620.0" y="735.0" text-anchor="middle" class="small">Audit-grade complete factorial within the declared two-level 2^3 candidate family; not a universal optimal-design proof.</text></svg>
